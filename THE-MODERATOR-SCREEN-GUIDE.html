<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root {
  --bg: #0a0a10;
  --sidebar-bg: #111118;
  --card: rgba(22,28,38,0.78);
  --card-border: rgba(255,255,255,0.12);
  --cyan: #00ffee;
  --magenta: #ff1a75;
  --orange: #ff8800;
  --orange-glow: rgba(255,136,0,0.3);
  --text: #b8c0d0;
  --text-heading: #e8eaf0;
  --text-muted: #4a5060;
  --text-sub: #7a8298;
  --border: rgba(255,255,255,0.12);
  --border-subtle: rgba(255,255,255,0.05);
  --font: 'Antonio', sans-serif;
  --badge-bg: #ff2200;
  --badge-text: #fff;
  --phone-bg: #000;
}
html { height: 100%; }
body {
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  height: 100%;
  display: flex;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px 0;
  display: flex;
  flex-direction: column;
}
.sidebar h1 {
  font-size: 14px;
  letter-spacing: 4px;
  color: var(--cyan);
  text-transform: uppercase;
  padding: 0 16px 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.sidebar-section {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  padding: 12px 16px 4px;
}
.sidebar button {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  color: var(--text-sub);
  font-family: var(--font);
  font-size: 13px;
  padding: 6px 16px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.15s;
}
.sidebar button:hover { color: var(--text-heading); background: rgba(255,255,255,0.04); }
.sidebar button.active { color: var(--cyan); background: rgba(0,255,238,0.06); border-left: 2px solid var(--cyan); }
.sidebar button .el-count {
  float: right;
  font-size: 11px;
  color: var(--text-muted);
}

/* Main */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 32px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.screen-header {
  width: 100%;
  max-width: 860px;
  margin-bottom: 24px;
}
.screen-header h2 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--cyan);
  text-transform: uppercase;
}
.screen-header .path {
  font-size: 14px;
  color: var(--text-sub);
  margin-top: 2px;
  letter-spacing: 1px;
}
.screen-header .desc {
  font-size: 14px;
  color: var(--text);
  margin-top: 8px;
  line-height: 1.6;
  max-width: 600px;
}

.content-row {
  display: flex;
  gap: 40px;
  max-width: 860px;
  width: 100%;
  align-items: flex-start;
}

/* Phone */
.phone {
  width: 360px;
  min-width: 360px;
  background: var(--phone-bg);
  border-radius: 28px;
  border: 3px solid rgba(255,255,255,0.12);
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}
.phone-inner {
  padding: 0;
  min-height: 640px;
  display: flex;
  flex-direction: column;
}

/* Elements inside phone */
.p-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: rgba(6,6,8,0.85);
  border-bottom: 1px solid var(--border-subtle);
}
.p-logo {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--cyan);
  text-transform: uppercase;
}
.p-logo small {
  display: block;
  font-size: 9px;
  font-weight: 300;
  color: var(--text-sub);
  letter-spacing: 4px;
}
.p-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 12px; }
.p-title { font-size: 20px; font-weight: 700; color: var(--text-heading); text-align: center; letter-spacing: 2px; text-transform: uppercase; }
.p-sub { font-size: 12px; color: var(--text-sub); text-align: center; line-height: 1.4; }
.p-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 12px;
}
.p-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; color: var(--text-sub); text-transform: uppercase; margin-bottom: 8px; }
.p-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 13px;
}
.p-row { display: flex; gap: 8px; }
.p-btn {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-sub);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  text-align: center;
}
.p-btn.primary {
  background: var(--orange);
  color: #000;
  border: none;
  font-size: 15px;
  letter-spacing: 2px;
}
.p-btn.primary.disabled { opacity: 0.35; }
.p-btn.cyan { border-color: var(--cyan); color: var(--cyan); background: rgba(0,255,238,0.06); }
.p-btn.magenta { border-color: var(--magenta); color: var(--magenta); }
.p-btn.outline { border: 1px solid var(--border); color: var(--text-sub); background: transparent; }
.p-btn.sm { padding: 8px; font-size: 12px; }
.p-footer { font-size: 10px; color: var(--text-muted); text-align: center; letter-spacing: 1px; padding: 8px 0; }
.p-divider { border-top: 1px solid var(--border-subtle); margin: 4px 0; }
.p-chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
.p-chip {
  padding: 6px 12px;
  border-radius: 16px;
  border: 1px solid var(--border);
  color: var(--text-sub);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
}
.p-chip.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,255,238,0.08); }
.p-toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
}
.p-toggle-label { font-size: 13px; color: var(--text); }
.p-toggle {
  width: 36px; height: 20px; border-radius: 10px;
  background: rgba(255,255,255,0.15);
  position: relative;
}
.p-toggle.on { background: var(--cyan); }
.p-toggle::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: white;
  top: 2px; left: 2px;
  transition: left 0.2s;
}
.p-toggle.on::after { left: 18px; }
.p-hotcard {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 10px;
}
.p-hotcard-author { font-size: 11px; color: var(--cyan); margin-bottom: 4px; }
.p-hotcard-text { font-size: 12px; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
.p-hotcard-actions { display: flex; gap: 12px; }
.p-hotcard-btn { font-size: 11px; color: var(--text-sub); cursor: pointer; }
.p-nav {
  display: flex;
  border-top: 1px solid var(--border);
  background: rgba(6,6,8,0.9);
}
.p-nav-item {
  flex: 1;
  text-align: center;
  padding: 10px 4px;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 1px;
}
.p-nav-item.active { color: var(--cyan); }
.p-tab-row { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.p-tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-sub);
  letter-spacing: 1px;
  cursor: pointer;
}
.p-tab.active { color: var(--cyan); border-bottom: 2px solid var(--cyan); }
.p-textarea {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 12px;
  min-height: 60px;
  resize: none;
}
.p-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.p-circle-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: transparent;
  color: var(--text-sub);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.p-circle-btn.send { background: var(--orange); color: #000; border: none; }
.p-section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 4px;
}
.p-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.p-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.p-select {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 13px;
}
.p-progress {
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}
.p-progress-fill { height: 100%; background: var(--cyan); border-radius: 2px; }
.p-countdown {
  font-size: 32px;
  font-weight: 700;
  color: var(--orange);
  text-align: center;
}
.p-score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.p-score-item { text-align: center; }
.p-score-val { font-size: 28px; font-weight: 700; color: var(--cyan); }
.p-score-lbl { font-size: 10px; color: var(--text-sub); letter-spacing: 2px; text-transform: uppercase; }
.p-back { font-size: 13px; color: var(--text-sub); cursor: pointer; }
.p-header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.p-header-icons { display: flex; gap: 12px; align-items: center; }
.p-icon { font-size: 16px; color: var(--text-sub); cursor: pointer; }
.p-group-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.p-group-name { font-size: 13px; color: var(--text-heading); }
.p-group-meta { font-size: 10px; color: var(--text-sub); }
.p-list-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-subtle);
}
.p-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); }
.p-static { font-size: 12px; color: var(--text-muted); text-align: center; font-style: italic; padding: 20px 0; }

/* Badge */
.b {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--badge-bg);
  color: var(--badge-text);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  box-shadow: 0 0 0 2px #000;
  position: relative;
  z-index: 10;
}
.el-row {
  display: flex;
  align-items: center;
  gap: 8px;
  position: relative;
}

/* Legend */
.legend {
  flex: 1;
  min-width: 260px;
}
.legend h3 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--orange);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.leg-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-subtle);
}
.leg-item:last-child { border-bottom: none; }
.leg-label { font-size: 13px; font-weight: 600; color: var(--text-heading); }
.leg-type {
  display: inline-block;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 1px 6px;
  border-radius: 3px;
  margin-left: 6px;
}
.t-link { background: rgba(0,255,238,0.12); color: var(--cyan); }
.t-input { background: rgba(255,136,0,0.12); color: var(--orange); }
.t-btn { background: rgba(255,26,117,0.12); color: var(--magenta); }
.t-toggle { background: rgba(138,43,226,0.15); color: #b388ff; }
.t-display { background: rgba(255,255,255,0.08); color: var(--text-muted); }
.t-gesture { background: rgba(0,200,83,0.12); color: #69f0ae; }
</style>

    {n:2, label:'Tap backdrop to close', type:'gesture'},
  ],
  layout: 'simple'
},
{
  id:'BG', title:'Screen BG', path:'Delete Account Modal', desc:'Permanent account deletion. Type DELETE to confirm.',
  elements: [
    {n:1, label:'Type DELETE input', type:'input'},
    {n:2, label:'CANCEL button', type:'btn'},
    {n:3, label:'DELETE confirm button', type:'btn'},
    {n:4, label:'Tap backdrop to close', type:'gesture'},
  ],
  layout: 'modal'
},
{
  id:'BH', title:'Screen BH', path:'Create Group Modal', desc:'Create a new group.',
  elements: [
    {n:1, label:'Group name input (50 char)', type:'input'},
    {n:2, label:'Group description textarea', type:'input'},
    {n:3, label:'Category select dropdown', type:'input'},
    {n:4, label:'CREATE GROUP button', type:'btn'},
  ],
  layout: 'modal'
},
{
  id:'BI', title:'Screen BI', path:'GvG Challenge Modal', desc:'Challenge another group. 1v1/3v3/5v5.',
  elements: [
    {n:1, label:'Opponent search input (100 char)', type:'input'},
    {n:2, label:'Opponent search results', type:'link'},
    {n:3, label:'Clear opponent (✕)', type:'btn'},
    {n:4, label:'Selected opponent display', type:'display'},
    {n:5, label:'Topic text input (200 char)', type:'input'},
    {n:6, label:'Category select dropdown', type:'input'},
    {n:7, label:'Format pills — 1v1/3v3/5v5', type:'btn'},
    {n:8, label:'SEND CHALLENGE ⚔️', type:'btn'},
    {n:9, label:'✕ Close button', type:'btn'},
    {n:10, label:'Backdrop tap to close', type:'gesture'},
  ],
  layout: 'modal'
},
];

// ============================================================
// RENDER
// ============================================================
const typeClass = {link:'t-link',input:'t-input',btn:'t-btn',toggle:'t-toggle',display:'t-display',gesture:'t-gesture'};
const typeLabel = {link:'LINK',input:'INPUT',btn:'BUTTON',toggle:'TOGGLE',display:'DISPLAY',gesture:'GESTURE'};

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<h1>Screen Guide</h1>';
  const sections = [
    {label: 'Guest Pages', ids: ['A','B','C']},
    {label: 'Landing Pages', ids: ['D','E']},
    {label: 'Auth / Onboarding', ids: ['F','G','H','I','J','K']},
    {label: 'Legal', ids: ['L','M']},
    {label: 'Main App', ids: ['N','O','P','Q','R','S']},
    {label: 'Standalone Pages', ids: ['T','U','V','W','X','Y']},
    {label: 'Arena Flow', ids: ['Z','AA','AB','AC','AD','AE','AF','AG','AH']},
    {label: 'Debate Rooms', ids: ['AI','AJ','AK','AL']},
    {label: 'Post-Debate', ids: ['AM','AN']},
    {label: 'Private / Mod', ids: ['AO','AP','AQ','AR','AS','AT','AU']},
    {label: 'Overlays / Modals', ids: ['AV','AW','AX','AY','AZ','BA','BB','BC','BD','BE','BF','BG','BH','BI']},
  ];
  sections.forEach(sec => {
    html += `<div class="sidebar-section">${sec.label}</div>`;
    sec.ids.forEach(id => {
      const s = screens.find(x => x.id === id);
      if (!s) return;
      html += `<button onclick="showScreen('${id}')" id="sb-${id}">${s.id}. ${s.path}<span class="el-count">${s.elements.length}</span></button>`;
    });
  });
  sb.innerHTML = html;
}

function renderPhone(screen) {
  const els = screen.elements;
  if (els.length === 0) {
    return `<div class="phone"><div class="phone-inner"><div class="p-body"><div class="p-static">No interactive elements on this screen.</div></div></div></div>`;
  }
  let html = '<div class="phone"><div class="phone-inner">';

  // Topbar for screens that have logo/back
  const firstEl = els[0];
  if (firstEl && (firstEl.label.includes('Logo') || firstEl.label.includes('Back'))) {
    html += `<div class="p-topbar">`;
    if (firstEl.label.includes('Logo')) {
      html += `<div class="el-row"><span class="b">${firstEl.n}</span><span class="p-logo"><small>THE</small>MODERATOR</span></div>`;
    } else {
      html += `<div class="el-row"><span class="b">${firstEl.n}</span><span class="p-back">← Back</span></div>`;
    }
    // Check for header-right elements (tokens, bell, avatar)
    const headerEls = els.filter(e => e.n > 1 && e.n <= 3 && (e.label.includes('Token') || e.label.includes('bell') || e.label.includes('Avatar button')));
    if (headerEls.length) {
      html += `<div class="p-header-icons">`;
      headerEls.forEach(e => {
        const icon = e.label.includes('Token') ? '🪙' : e.label.includes('bell') ? '🔔' : '👤';
        html += `<div class="el-row"><span class="b">${e.n}</span><span class="p-icon">${icon}</span></div>`;
      });
      html += `</div>`;
    }
    // Right side items for landing pages
    const joinEl = els.find(e => e.label.includes('JOIN FREE'));
    if (joinEl) {
      html += `<div class="el-row"><span class="b">${joinEl.n}</span><span style="font-size:11px;color:var(--orange);letter-spacing:1px;">JOIN FREE</span></div>`;
    }
    html += `</div>`;
  }

  html += `<div class="p-body">`;

  // Render remaining elements as a list with badges
  const skip = new Set();
  if (firstEl && (firstEl.label.includes('Logo') || firstEl.label.includes('Back'))) skip.add(firstEl.n);
  els.filter(e => e.label.includes('Token') || e.label.includes('bell') || e.label.includes('Avatar button') || e.label.includes('JOIN FREE')).forEach(e => skip.add(e.n));

  const remaining = els.filter(e => !skip.has(e.n));

  remaining.forEach(el => {
    if (el.type === 'display') {
      html += `<div class="el-row"><span class="b">${el.n}</span><div class="p-card" style="flex:1;min-height:${el.label.includes('feed') || el.label.includes('Chat') || el.label.includes('content') || el.label.includes('Transcript') ? '80' : '32'}px;display:flex;align-items:center;"><span style="font-size:11px;color:var(--text-muted);font-style:italic;">${el.label}</span></div></div>`;
    } else if (el.type === 'input') {
      html += `<div class="el-row"><span class="b">${el.n}</span><input class="p-input" style="flex:1" placeholder="${el.label}" disabled></div>`;
    } else if (el.type === 'toggle') {
      html += `<div class="el-row" style="justify-content:space-between;"><span class="b">${el.n}</span><span class="p-toggle-label" style="flex:1;font-size:12px;">${el.label}</span><div class="p-toggle on"></div></div>`;
    } else if (el.type === 'btn') {
      const isPrimary = el.label.includes('START') || el.label.includes('ENTER') || el.label.includes('CREATE') || el.label.includes('CONFIRM') || el.label.includes('SUBMIT') || el.label.includes('SAVE') || el.label.includes('SEND') || el.label.includes('POST') || el.label.includes('FORGE') || el.label.includes('ACCEPT') || el.label.includes('DELETE confirm') || el.label.includes('BUY');
      const isCyan = el.label.includes('For') || el.label.includes('Ranked') || el.label.includes('FAIR');
      const isMagenta = el.label.includes('Against') || el.label.includes('DECLINE') || el.label.includes('UNFAIR') || el.label.includes('DELETE ACCOUNT');
      const isOutline = el.label.includes('Cancel') || el.label.includes('SKIP') || el.label.includes('BACK') || el.label.includes('LOBBY') || el.label.includes('LEAVE') || el.label.includes('RETAKE') || el.label.includes('LOG OUT');
      const cls = isPrimary ? 'primary' : isCyan ? 'cyan' : isMagenta ? 'magenta' : isOutline ? 'outline' : '';
      const short = el.label.length > 35 ? el.label.substring(0,32) + '...' : el.label;
      html += `<div class="el-row"><span class="b">${el.n}</span><div class="p-btn ${cls}" style="flex:1;font-size:12px;">${short}</div></div>`;
    } else if (el.type === 'link') {
      html += `<div class="el-row"><span class="b">${el.n}</span><span style="flex:1;font-size:12px;color:var(--cyan);text-decoration:underline;">${el.label}</span></div>`;
    } else if (el.type === 'gesture') {
      html += `<div class="el-row"><span class="b">${el.n}</span><span style="flex:1;font-size:11px;color:var(--text-muted);font-style:italic;">⟡ ${el.label}</span></div>`;
    }
  });

  // Bottom nav for main app screens
  const navEls = els.filter(e => e.label.includes('tab') && (e.label.includes('Feed') || e.label.includes('Arena') || e.label.includes('Ranks') || e.label.includes('Groups') || e.label.includes('Profile')));
  if (navEls.length >= 4) {
    html += `</div><div class="p-nav">`;
    navEls.forEach(e => {
      const active = e.label.includes('(active)') || (screen.id === 'N' && e.label.includes('Feed')) || (screen.id === 'O' && e.label.includes('Arena')) || (screen.id === 'R' && e.label.includes('Ranks')) || (screen.id === 'P' && e.label.includes('Profile'));
      const icon = e.label.includes('Feed') ? '☰' : e.label.includes('Arena') ? '⚔' : e.label.includes('Ranks') ? '★' : e.label.includes('Groups') ? '◉' : '●';
      const lbl = e.label.includes('Feed') ? 'Feed' : e.label.includes('Arena') ? 'Arena' : e.label.includes('Ranks') ? 'Ranks' : e.label.includes('Groups') ? 'Groups' : 'Profile';
      html += `<div class="p-nav-item ${active ? 'active' : ''}"><span class="b" style="transform:scale(0.8);">${e.n}</span><br>${icon} ${lbl}</div>`;
    });
    html += `</div>`;
  } else {
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

function renderLegend(screen) {
  if (screen.elements.length === 0) return '';
  let html = '<div class="legend"><h3>Elements</h3>';
  screen.elements.forEach(el => {
    const tc = typeClass[el.type] || 't-display';
    const tl = typeLabel[el.type] || 'DISPLAY';
    html += `<div class="leg-item"><div class="b">${el.n}</div><div><span class="leg-label">${el.label}</span><span class="leg-type ${tc}">${tl}</span></div></div>`;
  });
  html += '</div>';
  return html;
}

function showScreen(id) {
  const screen = screens.find(s => s.id === id);
  if (!screen) return;

  // Update sidebar
  document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('sb-' + id);
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({block:'nearest'}); }

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="screen-header">
      <h2>${screen.title}</h2>
      <div class="path">${screen.path}</div>
      <div class="desc">${screen.desc}</div>
    </div>
    <div class="content-row">
      ${renderPhone(screen)}
      ${renderLegend(screen)}
    </div>
  `;
  main.scrollTop = 0;
}

// Init
renderSidebar();
showScreen('A');
</script>
</body>
</html>
