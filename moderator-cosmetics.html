<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Armory — The Moderator</title>
  <meta name="theme-color" content="#0a1128">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── Reset ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:          #0a1128;
      --navy-mid:      #1a2d4a;
      --navy-light:    #2d5a8e;
      --blue-mid:      #3d5a80;
      --gold:          #c9a84c;
      --gold-light:    #e2c97e;
      --gold-dim:      #7a6530;
      --red:           #c0392b;
      --white:         #f0ede8;
      --white-dim:     rgba(240,237,232,0.6);
      --white-ghost:   rgba(240,237,232,0.1);
      --glass:         rgba(10,17,40,0.65);
      --glass-light:   rgba(45,90,142,0.25);
      --border:        rgba(201,168,76,0.2);
      --border-bright: rgba(201,168,76,0.5);
      --danger:        #e74c3c;
      --success:       #27ae60;
      --radius:        12px;
      --radius-sm:     8px;
      --touch:         44px;
      --font-display:  'Cinzel', serif;
      --font-body:     'Barlow Condensed', sans-serif;
    }

    html, body {
      height: 100%;
      background: linear-gradient(145deg,
        #0a1128 0%, #1a2d4a 25%, #2d5a8e 55%, #3d5a80 75%, #1a2d4a 100%);
      background-attachment: fixed;
      color: var(--white);
      font-family: var(--font-body);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Layout ───────────────────────────────────────────── */
    .screen {
      max-width: 640px;
      margin: 0 auto;
      min-height: 100dvh;
      padding-bottom: 80px;
    }

    @media (min-width: 768px) {
      body { display: flex; justify-content: center; }
      .screen { width: 640px; }
    }

    /* ── Top nav ──────────────────────────────────────────── */
    .top-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      background: var(--glass);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--touch);
      height: var(--touch);
      background: var(--white-ghost);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--gold);
      text-decoration: none;
      font-size: 20px;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .back-btn:hover { background: var(--glass-light); }

    .nav-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--gold);
    }

    /* ── Loading ──────────────────────────────────────────── */
    #cosmetics-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      gap: 16px;
    }
    #cosmetics-loader.hidden { display: none; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-family: var(--font-display);
      font-size: 12px;
      letter-spacing: 0.15em;
      color: var(--white-dim);
      text-transform: uppercase;
    }

    /* ── App shell ────────────────────────────────────────── */
    #cosmetics-app.hidden { display: none; }

    /* ── Shop header ──────────────────────────────────────── */
    .shop-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 8px;
    }

    .shop-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .token-display {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--glass);
      border: 1px solid var(--border-bright);
      border-radius: 20px;
      padding: 6px 14px;
    }
    .token-icon  { font-size: 15px; color: var(--gold); }
    .token-amount {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      color: var(--gold-light);
    }
    .token-label { font-size: 11px; color: var(--white-dim); letter-spacing: 0.05em; }

    .btn-signin-header {
      padding: 8px 18px;
      background: var(--gold);
      color: var(--navy);
      border-radius: 20px;
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-decoration: none;
      white-space: nowrap;
    }

    /* ── Tab nav ──────────────────────────────────────────── */
    .tab-nav {
      display: flex;
      overflow-x: auto;
      padding: 12px 20px 0;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }

    .tab-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 14px 12px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--white-dim);
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
      min-width: var(--touch);
    }
    .tab-btn:hover { color: var(--white); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-icon { font-size: 18px; }

    /* ── Tab content ──────────────────────────────────────── */
    .tab-content { padding: 16px 20px; }

    /* ── Item grid ────────────────────────────────────────── */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 440px) {
      .item-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .item-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(8px);
      transition: border-color 0.15s, transform 0.1s;
    }
    .item-card:hover { border-color: var(--border-bright); transform: translateY(-1px); }
    .item-card.state-equipped {
      border-color: var(--gold);
      box-shadow: 0 0 14px rgba(201,168,76,0.2);
    }
    .item-card.state-owned  { border-color: rgba(201,168,76,0.35); }
    .item-card.state-locked { opacity: 0.72; }

    .item-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 8px 0;
      min-height: 22px;
    }

    .tier-pip {
      font-size: 10px;
      font-weight: 700;
      font-family: var(--font-display);
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.04em;
    }
    .tier-1 { background: var(--glass-light); color: var(--white-dim); }
    .tier-2 { background: rgba(201,168,76,0.18); color: var(--gold); }
    .tier-3 { background: rgba(201,168,76,0.35); color: var(--gold-light); }

    .equipped-tag {
      font-size: 10px;
      font-weight: 700;
      font-family: var(--font-display);
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .item-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 76px;
      padding: 8px;
    }
    .preview-glyph { font-size: 38px; }
    .preview-img, .preview-video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
    }

    .item-card-body { padding: 4px 10px 6px; flex: 1; }

    .item-name {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--white);
      line-height: 1.3;
    }
    .item-condition {
      font-size: 10px;
      color: var(--white-dim);
      margin-top: 2px;
      line-height: 1.3;
    }

    .item-card-footer { padding: 0 10px 10px; }

    /* ── Item buttons ─────────────────────────────────────── */
    .btn-item {
      width: 100%;
      height: 34px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-item:active { transform: scale(0.97); }
    .btn-item:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-purchase {
      background: linear-gradient(135deg, var(--gold), #9a7228);
      color: var(--navy);
    }
    .btn-purchase:hover:not(:disabled) { opacity: 0.9; }

    .btn-equip {
      background: var(--glass-light);
      border: 1px solid var(--border-bright);
      color: var(--white);
    }
    .btn-equip:hover:not(:disabled) { background: rgba(45,90,142,0.5); }

    .btn-equipped {
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--gold-dim);
    }

    .btn-depth-locked {
      background: var(--white-ghost);
      border: 1px solid var(--border);
      color: var(--white-dim);
      font-size: 11px;
    }

    .btn-guest {
      background: var(--white-ghost);
      border: 1px solid var(--border);
      color: var(--white-dim);
    }

    /* ── Badge cabinet ────────────────────────────────────── */
    .cabinet-label {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--white-dim);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .badge-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    @media (min-width: 440px) {
      .badge-grid { grid-template-columns: repeat(5, 1fr); }
    }

    .badge-tile {
      aspect-ratio: 1;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px;
      transition: transform 0.1s, border-color 0.15s;
    }

    .badge-tile.owned {
      background: var(--glass);
      border: 1px solid var(--border-bright);
      backdrop-filter: blur(8px);
      cursor: pointer;
    }
    .badge-tile.owned:hover   { border-color: var(--gold); transform: scale(1.04); }
    .badge-tile.owned:active  { transform: scale(0.97); }

    .badge-tile.locked {
      background: rgba(10,17,40,0.4);
      border: 1px dashed var(--border);
      cursor: default;
    }

    .badge-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--glass-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
    }
    .badge-img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
    .locked-icon { background: var(--white-ghost); color: var(--white-dim); }

    .badge-name {
      font-size: 9px;
      font-family: var(--font-display);
      letter-spacing: 0.04em;
      text-align: center;
      color: var(--white);
      line-height: 1.2;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .locked-name { color: var(--white-dim); }

    /* ── Modals ───────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
    }
    .modal-overlay.hidden { display: none; }

    @media (min-width: 480px) {
      .modal-overlay { align-items: center; justify-content: center; }
    }

    .modal-card {
      background: var(--navy-mid);
      border: 1px solid var(--border-bright);
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 28px 24px 36px;
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    @media (min-width: 480px) {
      .modal-card {
        border-bottom: 1px solid var(--border-bright);
        border-radius: var(--radius);
        max-width: 360px;
        width: 90%;
      }
    }

    .modal-item-name {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--gold-light);
      text-align: center;
    }

    .modal-cost {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 700;
      color: var(--gold);
    }
    .modal-cost-label {
      font-size: 14px;
      color: var(--white-dim);
      align-self: flex-end;
      padding-bottom: 4px;
    }

    .modal-balance-after {
      text-align: center;
      font-size: 13px;
      color: var(--white-dim);
      letter-spacing: 0.03em;
    }

    .modal-info-body {
      text-align: center;
      font-size: 15px;
      color: var(--white-dim);
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .btn-modal-cancel, .btn-modal-confirm {
      flex: 1;
      height: var(--touch);
      border-radius: var(--radius-sm);
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn-modal-cancel:disabled,
    .btn-modal-confirm:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-modal-cancel {
      background: var(--white-ghost);
      border: 1px solid var(--border);
      color: var(--white-dim);
    }
    .btn-modal-cancel:hover:not(:disabled) { background: rgba(240,237,232,0.18); }

    .btn-modal-confirm {
      background: linear-gradient(135deg, var(--gold), #9a7228);
      color: var(--navy);
    }
    .btn-modal-confirm:hover:not(:disabled) { opacity: 0.9; }

    /* ── Utility ──────────────────────────────────────────── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="screen">

    <nav class="top-nav">
      <a href="/" class="back-btn" aria-label="Back">←</a>
      <div class="nav-title">Armory</div>
    </nav>

    <div id="cosmetics-loader">
      <div class="spinner"></div>
      <div class="loader-text">Loading Armory…</div>
    </div>

    <div id="cosmetics-app" class="hidden"></div>

  </div>

  <script type="module" src="./src/pages/cosmetics.ts"></script>
</body>
</html>
