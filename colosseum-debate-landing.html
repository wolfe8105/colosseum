<html lang="en">

<style>
:root {
  --bg-1:#1a2d4a;--bg-2:#2d5a8e;--bg-3:#5b8abf;--bg-4:#7aa3d4;--bg-5:#3d5a80;
  --navy:#0a1628;--navy-light:#132240;--navy-mid:#1a2d4a;
  --card-bg:rgba(10,17,40,0.6);--card-border:rgba(255,255,255,0.22);--card-border-hover:rgba(255,255,255,0.4);
  --red:#cc2936;--red-hover:#e63946;--gold:#d4a843;--gold-dim:#b8922e;
  --white:#f0f0f0;--white-dim:#a0a8b8;--success:#2ecc71;--error:#e74c3c;
  --font-display:'Cinzel',serif;--font-body:'Barlow Condensed',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-body);color:var(--white);min-height:100dvh;
  background:var(--bg-1);overflow-y:auto;
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 calc(80px + var(--safe-bottom));
}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(135deg,#1a2d4a 0%,#2d5a8e 25%,#5b8abf 50%,#7aa3d4 70%,#3d5a80 100%);z-index:-2}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(212,168,67,0.06) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(204,41,54,0.04) 0%,transparent 50%);z-index:-1}

/* TOP BAR */
.top-bar{
  width:100%;padding:calc(12px + var(--safe-top)) 16px 12px;
  background:rgba(10,17,40,0.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.logo{font-family:var(--font-display);font-size:16px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase;text-decoration:none}
.logo .the{font-weight:400;color:var(--white-dim);font-size:11px;letter-spacing:4px;display:block;line-height:1;margin-bottom:-2px}
.join-btn{
  padding:8px 18px;border-radius:20px;border:1px solid var(--gold-dim);
  background:rgba(212,168,67,0.1);color:var(--gold);
  font-family:var(--font-body);font-size:14px;font-weight:600;letter-spacing:1px;
  cursor:pointer;transition:all 0.2s;text-decoration:none;
}
.join-btn:active{background:rgba(212,168,67,0.2);transform:scale(0.96)}

/* CONTAINER */
.container{width:100%;max-width:520px;padding:0 16px;display:flex;flex-direction:column;gap:20px;margin-top:20px}

/* CATEGORY PILL */
.cat-pill{
  align-self:flex-start;display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:var(--white-dim);
}
.cat-pill .cat-icon{font-size:15px}

/* DEBATE CARD */
.debate-card{
  background:var(--card-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--card-border);border-radius:18px;
  padding:24px 20px;display:flex;flex-direction:column;gap:18px;
}
.debate-topic{
  font-family:var(--font-display);font-size:20px;font-weight:700;
  letter-spacing:1px;line-height:1.3;color:var(--white);text-align:center;
}

/* VOTE BUTTONS */
.vote-row{display:flex;gap:10px}
.vote-btn{
  flex:1;padding:16px 12px;border-radius:14px;border:2px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);cursor:pointer;transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:4px;min-height:64px;
  -webkit-tap-highlight-color:transparent;
}
.vote-btn .vote-label{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:1px;color:var(--white)}
.vote-btn .vote-sub{font-size:12px;color:var(--white-dim)}
.vote-btn:active{transform:scale(0.97)}
.vote-btn.yes:hover,.vote-btn.yes:active{border-color:var(--success);background:rgba(46,204,113,0.08)}
.vote-btn.no:hover,.vote-btn.no:active{border-color:var(--red);background:rgba(204,41,54,0.08)}
.vote-btn.voted{pointer-events:none;opacity:0.7}
.vote-btn.voted.winner{opacity:1;border-color:var(--gold);background:rgba(212,168,67,0.1)}

/* RESULTS BAR */
.results-section{display:none;flex-direction:column;gap:10px}
.results-section.show{display:flex}
.vote-bar-track{width:100%;height:36px;border-radius:10px;background:rgba(255,255,255,0.06);overflow:hidden;display:flex;position:relative}
.vote-bar-fill{height:100%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;transition:width 0.6s cubic-bezier(0.16,1,0.3,1);min-width:36px}
.vote-bar-fill.yes-fill{background:rgba(46,204,113,0.25);color:var(--success)}
.vote-bar-fill.no-fill{background:rgba(204,41,54,0.25);color:var(--red)}
.vote-count{text-align:center;font-size:13px;color:var(--white-dim)}

/* HOT TAKES */
.section-label{
  font-family:var(--font-display);font-size:13px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);
  margin-top:8px;
}
.takes-list{display:flex;flex-direction:column;gap:10px}
.take-card{
  background:var(--card-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);border-radius:14px;
  padding:14px 16px;display:flex;flex-direction:column;gap:6px;
}
.take-author{font-size:13px;color:var(--gold-dim);font-weight:600}
.take-text{font-size:15px;line-height:1.4;color:var(--white)}
.take-reactions{display:flex;gap:12px;font-size:13px;color:var(--white-dim)}

/* CTA BANNER */
.cta-banner{
  background:linear-gradient(135deg,rgba(212,168,67,0.12) 0%,rgba(204,41,54,0.08) 100%);
  border:1px solid rgba(212,168,67,0.25);border-radius:18px;
  padding:24px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;
}
.cta-headline{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:1px;color:var(--gold)}
.cta-sub{font-size:14px;color:var(--white-dim);line-height:1.4}
.cta-oauth-row{display:flex;gap:10px;width:100%;max-width:320px}
.oauth-btn{
  flex:1;padding:12px;border-radius:12px;border:none;cursor:pointer;
  font-family:var(--font-body);font-size:14px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.2s;min-height:48px;
}
.oauth-btn.google{background:#fff;color:#333}
.oauth-btn.apple{background:#000;color:#fff}
.oauth-btn:active{transform:scale(0.96)}
.cta-email-link{font-size:13px;color:var(--white-dim);text-decoration:underline;cursor:pointer}

/* MORE DEBATES */
.more-debates{display:flex;flex-direction:column;gap:12px}
.mini-debate{
  background:var(--card-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);border-radius:14px;
  padding:16px;cursor:pointer;transition:all 0.2s;
}
.mini-debate:active{border-color:var(--card-border-hover);transform:scale(0.98)}
.mini-topic{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:0.5px;margin-bottom:6px}
.mini-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--white-dim)}
.mini-cat{color:var(--gold-dim);font-weight:600;text-transform:uppercase;letter-spacing:1px}

/* WATERMARK (Item 16.5.2) */
.watermark{
  text-align:center;font-size:12px;color:var(--white-dim);
  padding:20px 16px;letter-spacing:0.5px;opacity:0.7;
}
.watermark a{color:var(--gold-dim);text-decoration:none}

/* SHARE BUTTONS */
.share-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.share-btn{
  padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);color:var(--white-dim);
  font-family:var(--font-body);font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px;
}
.share-btn:active{background:rgba(255,255,255,0.08);transform:scale(0.96)}

/* CONFETTI */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:9999;animation:confettiFall 1.2s ease-out forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(120vh) rotate(720deg)}}

@media(min-width:768px){
  .container{max-width:580px}
  .debate-topic{font-size:24px}
}

/* === LEGAL FOOTER === */
.colosseum-legal-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10, 17, 40, 0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-top: 1px solid rgba(240, 192, 64, 0.15);
  padding: 10px 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 24px;
  z-index: 9999;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85rem;
  font-weight: 400;
  letter-spacing: 0.5px;
}
.colosseum-legal-footer a {
  color: #a0b8d0;
  text-decoration: none;
  transition: color 0.2s;
}
.colosseum-legal-footer a:hover {
  color: #f0c040;
}
.colosseum-legal-footer .footer-sep {
  color: rgba(240, 192, 64, 0.3);
  font-weight: 300;
}
.colosseum-legal-footer .footer-copy {
  color: #5a7a96;
}

/* === AI-GENERATED CONTENT BADGE === */
.ai-generated-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(240, 192, 64, 0.1);
  border: 1px solid rgba(240, 192, 64, 0.3);
  border-radius: 6px;
  padding: 6px 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  color: #f0c040;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.ai-generated-badge .ai-icon {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: rgba(240, 192, 64, 0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: #f0c040;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <a href="/" class="logo"><span class="the">THE</span>COLOSSEUM</a>
  <a href="colosseum-plinko.html" class="join-btn">JOIN FREE</a>
</div>

<!-- MAIN CONTAINER -->
<div class="container" id="main-container">
  <!-- Populated by JS based on URL params -->
</div>

<!-- WATERMARK -->
<div class="watermark">⚔️ Settle YOUR debate → <a href="https://colosseum-six.vercel.app">thecolosseum.app</a></div>

<!-- Supabase SDK (lightweight — only used for vote RPCs) -->
<script src="colosseum-locks-fix.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.98.0" integrity="sha384-Sm2s7OXxsAMTyJ4iIyRBgVpeGUvMPk2lRQnnZhE78Wej7oggIoolKt+SCt0XJbUB" crossorigin="anonymous"></script>
<script src="colosseum-config.js"></script>

<script>
// ============================================================
// COLOSSEUM DEBATE LANDING PAGE (Item 6.2.16.1)
// Ungated entry point. Vote without signup. Conversion funnel.
// URL: /debate?topic=slug&cat=sports
// SESSION 103: Backend persistence via landing_vote_counts table
//   + cast_landing_vote / get_landing_votes SECURITY DEFINER RPCs
//   Optimistic render + backend sync. voteCounted flag prevents
//   double-counting the +1 after backend confirms.
// ============================================================

// --- Init Supabase ---
const cfg = window.ColosseumConfig || {};
const sb = window.supabase.createClient(
  cfg.SUPABASE_URL || 'https://faomczmipsccwbhpivmp.supabase.co',
  cfg.SUPABASE_ANON_KEY || 'PASTE_YOUR_ANON_KEY_HERE'
);

// --- Local HTML escape (this page doesn't load colosseum-config.js escapeHTML) ---
// OWASP: escape all 5 significant XML characters (&, <, >, ", ')
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

// --- DEMO DEBATES (seed data — backend counts override these on load) ---
const DEBATES = {
  'mahomes-vs-allen': {
    topic: 'Is Patrick Mahomes better than Josh Allen?',
    sideA: 'Mahomes', sideB: 'Allen',
    category: 'sports', catIcon: '🏈', catLabel: 'Sports',
    yesVotes: 847, noVotes: 762,
    takes: [
      { author: 'GridironGuru', text: 'Three rings. End of discussion. Mahomes has more hardware than Allen will ever see.', fire: 42, swords: 18 },
      { author: 'BillsMafia4Life', text: 'Allen does more with less. Put him on the Chiefs and he\'d have 5 rings by now.', fire: 38, swords: 31 },
      { author: 'NFLAnalytics', text: 'Stats don\'t lie — Allen\'s rushing adds a dimension Mahomes can\'t match. Total package.', fire: 27, swords: 12 },
    ]
  },
  'caleb-downs-combine': {
    topic: 'Is Caleb Downs worth a top 10 pick in the 2026 NFL Draft?',
    sideA: 'Yes — Top 10', sideB: 'No — Reach',
    category: 'sports', catIcon: '🏈', catLabel: 'Sports',
    yesVotes: 534, noVotes: 289,
    takes: [
      { author: 'DraftSzn', text: 'Best safety prospect since Ed Reed. You take that every time.', fire: 55, swords: 8 },
      { author: 'ScoutingDept', text: 'Safety at 10 is a luxury pick. Build the trenches first.', fire: 31, swords: 22 },
    ]
  },
  'trump-tariffs': {
    topic: 'Will Trump\'s new tariffs help or hurt the average American?',
    sideA: 'Help', sideB: 'Hurt',
    category: 'politics', catIcon: '🏛️', catLabel: 'Politics',
    yesVotes: 612, noVotes: 871,
    takes: [
      { author: 'EconWatcher', text: 'Every economist agrees: tariffs are a tax on consumers. Your groceries are about to get expensive.', fire: 63, swords: 41 },
      { author: 'MadeInUSA', text: 'Short term pain for long term gain. We need manufacturing back on American soil.', fire: 48, swords: 33 },
    ]
  },
  'beyonce-overrated': {
    topic: 'Is Beyoncé overrated?',
    sideA: 'Yes', sideB: 'No',
    category: 'entertainment', catIcon: '🎤', catLabel: 'Entertainment',
    yesVotes: 223, noVotes: 891,
    takes: [
      { author: 'MusicCritic101', text: 'Talented? Sure. Greatest of all time? The Beyhive has lost its mind.', fire: 72, swords: 88 },
      { author: 'QueenBFan', text: '28 Grammys. Most awarded artist in history. "Overrated" is cope.', fire: 94, swords: 15 },
    ]
  }
};

// voteCounted: true once backend counts are loaded or vote is confirmed.
// Prevents adding +1 optimistically when backend already includes the vote.
let voteCounted = false;

const container = document.getElementById('main-container');

// --- Parse URL params ---
const params = new URLSearchParams(window.location.search);
const topicSlug = params.get('topic') || 'mahomes-vs-allen';
const customTitle = params.get('title');
const source = params.get('src'); // telegram, telegram-inline, etc.

// Custom topic support — when Telegram bot (or any link) passes a title for a topic not in DEBATES
if (topicSlug && !DEBATES[topicSlug] && customTitle) {
  const catMap = { sports: ['🏈','Sports'], politics: ['🏛️','Politics'], entertainment: ['🎤','Entertainment'], music: ['🎵','Music'], trending: ['🔥','Trending'] };
  const cat = params.get('cat');
  const [catIcon, catLabel] = catMap[cat] || ['🔥','Trending'];
  DEBATES[topicSlug] = {
    topic: decodeURIComponent(customTitle),
    sideA: 'Yes', sideB: 'No',
    category: cat || 'trending', catIcon, catLabel,
    yesVotes: 0, noVotes: 0,
    takes: [
      { author: 'The Colosseum', text: 'This debate was started from ' + (source === 'telegram' || source === 'telegram-inline' ? 'Telegram' : 'a shared link') + '. Cast your vote and drop a hot take!', fire: 1, swords: 0 },
    ]
  };
}

const debate = DEBATES[topicSlug] || DEBATES['mahomes-vs-allen'];

// --- Check if already voted (localStorage) ---
const voteKey = 'colosseum_vote_' + topicSlug;
const existingVote = localStorage.getItem(voteKey);

// --- Update document title ---
document.title = debate.topic + ' — The Colosseum';

// --- Render ---
function render() {
  const hasVoted = !!localStorage.getItem(voteKey);
  const votedSide = localStorage.getItem(voteKey);

  let html = '';

  // Category pill
  html += `<a href="https://colosseum-six.vercel.app" class="cat-pill" style="text-decoration:none;color:inherit;cursor:pointer;"><span class="cat-icon">${escHtml(debate.catIcon)}</span>${escHtml(debate.catLabel)}</a>`;

  // Main debate card
  html += `<div class="debate-card">`;
  html += `<div class="debate-topic">${escHtml(debate.topic)}</div>`;

  // AI badge (conditional — only for auto-generated debates)
  if (debate.is_auto) {
    html += `<div class="ai-generated-badge">
      <span class="ai-icon">AI</span>
      AI-Generated Debate — Not Real People
    </div>`;
  }

  if (!hasVoted) {
    html += `<div class="vote-row">
      <button class="vote-btn yes" onclick="castVote('yes')">
        <span class="vote-label">${escHtml(debate.sideA)}</span>
        <span class="vote-sub">Pick this side</span>
      </button>
      <button class="vote-btn no" onclick="castVote('no')">
        <span class="vote-label">${escHtml(debate.sideB)}</span>
        <span class="vote-sub">Pick this side</span>
      </button>
    </div>`;
  } else {
    // If voteCounted is true, backend counts already include this vote — don't add +1
    const yV = debate.yesVotes + (!voteCounted && votedSide === 'yes' ? 1 : 0);
    const nV = debate.noVotes + (!voteCounted && votedSide === 'no' ? 1 : 0);
    const tot = yV + nV || 1;
    const yPct = Math.round((yV / tot) * 100);
    const nPct = 100 - yPct;
    html += `<div class="vote-row">
      <button class="vote-btn yes voted ${votedSide === 'yes' ? 'winner' : ''}">
        <span class="vote-label">${escHtml(debate.sideA)}</span>
        <span class="vote-sub">${votedSide === 'yes' ? '✓ Your pick' : ''}</span>
      </button>
      <button class="vote-btn no voted ${votedSide === 'no' ? 'winner' : ''}">
        <span class="vote-label">${escHtml(debate.sideB)}</span>
        <span class="vote-sub">${votedSide === 'no' ? '✓ Your pick' : ''}</span>
      </button>
    </div>`;
    html += `<div class="results-section show">
      <div class="vote-bar-track">
        <div class="vote-bar-fill yes-fill" style="width:${yPct}%">${yPct}%</div>
        <div class="vote-bar-fill no-fill" style="width:${nPct}%">${nPct}%</div>
      </div>
      <div class="vote-count">${(yV + nV).toLocaleString()} votes</div>
    </div>`;
  }

  // Share buttons (post-vote or always)
  if (hasVoted) {
    html += `<div class="share-row">
      <button class="share-btn" onclick="shareDebate('copy')">📋 Copy Link</button>
      <button class="share-btn" onclick="shareDebate('x')">𝕏 Share</button>
      <button class="share-btn" onclick="shareDebate('native')">📤 Share</button>
      <button class="share-btn" onclick="downloadCard()">🖼️ Save Card</button>
    </div>`;
  }

  html += `</div>`; // end debate-card

  // Hot Takes
  if (debate.takes && debate.takes.length) {
    html += `<div class="section-label">🔥 Hot Takes</div>`;
    html += `<div class="takes-list">`;
    debate.takes.forEach(t => {
      html += `<div class="take-card">
        <div class="take-author">@${escHtml(t.author)}</div>
        <div class="take-text">${escHtml(t.text)}</div>
        <div class="take-reactions"><span>🔥 ${Number(t.fire)||0}</span><span>⚔️ ${Number(t.swords)||0}</span></div>
      </div>`;
    });
    html += `</div>`;
  }

  // CTA Banner
  html += `<div class="cta-banner">
    <div class="cta-headline">⚔️ Want to debate this?</div>
    <div class="cta-sub">Sign up in 10 seconds. Argue your side. Win Elo. Earn glory.</div>
    <div class="cta-oauth-row">
      <button class="oauth-btn google" onclick="goSignup()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="oauth-btn apple" onclick="goSignup()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Apple
      </button>
    </div>
    <span class="cta-email-link" onclick="goSignup()">or use email →</span>
  </div>`;

  // More Debates
  const otherSlugs = Object.keys(DEBATES).filter(s => s !== topicSlug);
  if (otherSlugs.length) {
    html += `<div class="section-label">⚔️ More Debates</div>`;
    html += `<div class="more-debates">`;
    otherSlugs.forEach(slug => {
      const d = DEBATES[slug];
      const dTotal = d.yesVotes + d.noVotes;
      const safeSlug = encodeURIComponent(slug);
      html += `<div class="mini-debate" onclick="window.location.href='/debate?topic=${safeSlug}'">
        <div class="mini-topic">${escHtml(d.topic)}</div>
        <div class="mini-meta">
          <span class="mini-cat">${escHtml(d.catIcon)} ${escHtml(d.catLabel)}</span>
          <span>${dTotal.toLocaleString()} votes</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  container.innerHTML = html;
}

// --- Cast Vote (optimistic render + backend sync) ---
function castVote(side) {
  // 1. Record in localStorage immediately
  localStorage.setItem(voteKey, side);

  // 2. Optimistic render — voteCounted is false, so render() adds +1
  voteCounted = false;
  spawnConfetti();
  render();

  // 3. Fire backend RPC (non-blocking)
  sb.rpc('cast_landing_vote', { p_topic: topicSlug, p_side: side })
    .then(({ data, error }) => {
      if (error) {
        console.warn('Landing vote RPC error:', error.message);
        return;
      }
      // Backend confirmed — update counts from returned data
      if (data && typeof data.yes_votes === 'number') {
        debate.yesVotes = data.yes_votes;
        debate.noVotes = data.no_votes;
        voteCounted = true; // Backend counts now include our vote
        render(); // Re-render with confirmed counts
      }
    })
    .catch(err => {
      // Network error — optimistic counts stay, no re-render
      console.warn('Landing vote network error:', err);
    });
}

// --- Fetch real vote counts on page load ---
async function loadBackendCounts() {
  try {
    const allTopics = Object.keys(DEBATES);
    const { data, error } = await sb.rpc('get_landing_votes', { p_topics: allTopics });

    if (error || !data) return;

    // data is an object keyed by topic slug: { "slug": { yes_votes, no_votes } }
    for (const [slug, counts] of Object.entries(data)) {
      if (DEBATES[slug]) {
        DEBATES[slug].yesVotes = Number(counts.yes_votes) || 0;
        DEBATES[slug].noVotes = Number(counts.no_votes) || 0;
      }
    }

    // If user already voted, backend counts include their vote
    if (localStorage.getItem(voteKey)) {
      voteCounted = true;
    }

    render(); // Re-render with real counts
  } catch (err) {
    // Non-blocking — seed data stays
    console.warn('Failed to load backend vote counts:', err);
  }
}

// --- Confetti ---
function spawnConfetti() {
  const colors = ['#d4a843','#cc2936','#2ecc71','#5b8abf','#f0f0f0','#e63946'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = (Math.random() * 30 - 10) + 'vh';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = (Math.random() * 0.4) + 's';
    el.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

// --- Share ---
function shareDebate(method) {
  const url = window.location.href;
  const text = `${debate.topic} — Cast your vote!`;

  if (method === 'copy') {
    navigator.clipboard.writeText(url).then(() => {
      showToast('Link copied!');
    }).catch(() => {
      showToast('Could not copy');
    });
  } else if (method === 'x') {
    window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank', 'noopener,noreferrer');
  } else if (method === 'native') {
    if (navigator.share) {
      navigator.share({ title: debate.topic, text: text, url: url }).catch(() => {});
    } else {
      navigator.clipboard.writeText(url).then(() => showToast('Link copied!')).catch(() => {});
    }
  }
}

// --- Download Share Card ---
function downloadCard() {
  if (typeof ColosseumCards !== 'undefined') {
    const votedSide = localStorage.getItem(voteKey);
    const yV = debate.yesVotes + (!voteCounted && votedSide === 'yes' ? 1 : 0);
    const nV = debate.noVotes + (!voteCounted && votedSide === 'no' ? 1 : 0);
    ColosseumCards.downloadCard({
      topic: debate.topic,
      sideA: debate.sideA,
      sideB: debate.sideB,
      yesVotes: yV,
      noVotes: nV,
      size: 'og'
    });
  } else {
    showToast('Card generator not loaded');
  }
}

// --- Toast ---
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(10,17,40,0.95);color:#f0f0f0;padding:10px 20px;border-radius:10px;font-family:var(--font-body);font-size:14px;font-weight:600;z-index:9999;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px);';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// --- Go to Signup ---
function goSignup() {
  window.location.href = 'colosseum-plinko.html';
}

// --- Init ---
render();              // Immediate render with seed data
loadBackendCounts();   // Async fetch real counts, re-render when ready
