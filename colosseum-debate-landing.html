<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--mod-font-ui);color:var(--mod-text-primary);min-height:100dvh;
  background:var(--mod-bg-base);overflow-y:auto;
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 calc(80px + var(--safe-bottom));
}
body::before{content:'';position:fixed;inset:0;background:var(--mod-bg-base);z-index:-2}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,var(--mod-accent-muted) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,var(--mod-accent-muted) 0%,transparent 50%);z-index:-1}

/* TOP BAR */
.top-bar{
  width:100%;padding:calc(12px + var(--safe-top)) 16px 12px;
  background:var(--mod-bg-overlay);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.logo{font-family:var(--mod-font-ui);font-size:16px;font-weight:700;letter-spacing:3px;color:var(--mod-text-heading);text-transform:uppercase;text-decoration:none}
.logo .the{font-weight:400;color:var(--mod-text-muted);font-size:11px;letter-spacing:4px;display:block;line-height:1;margin-bottom:-2px}
.join-btn{
  padding:8px 18px;border-radius:20px;border:1px solid var(--mod-bar-secondary);
  background:var(--mod-accent-muted);color:var(--mod-text-heading);
  font-family:var(--mod-font-ui);font-size:14px;font-weight:600;letter-spacing:1px;
  cursor:pointer;transition:all 0.2s;text-decoration:none;
}
.join-btn:active{background:var(--mod-accent-border);transform:scale(0.96)}

/* CONTAINER */
.container{width:100%;max-width:520px;padding:0 16px;display:flex;flex-direction:column;gap:20px;margin-top:20px}

/* CATEGORY PILL */
.cat-pill{
  align-self:flex-start;display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:var(--mod-text-muted);
}
.cat-pill .cat-icon{font-size:15px}

/* DEBATE CARD */
.debate-card{
  background:var(--mod-bg-card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--mod-border-primary);border-radius:18px;
  padding:24px 20px;display:flex;flex-direction:column;gap:18px;
}
.debate-topic{
  font-family:var(--mod-font-ui);font-size:20px;font-weight:700;
  letter-spacing:1px;line-height:1.3;color:var(--mod-text-primary);text-align:center;
}

/* VOTE BUTTONS */
.vote-row{display:flex;gap:10px}
.vote-btn{
  flex:1;padding:16px 12px;border-radius:14px;border:2px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);cursor:pointer;transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:4px;min-height:64px;
  -webkit-tap-highlight-color:transparent;
}
.vote-btn .vote-label{font-family:var(--mod-font-ui);font-size:15px;font-weight:700;letter-spacing:1px;color:var(--mod-text-primary)}
.vote-btn .vote-sub{font-size:12px;color:var(--mod-text-muted)}
.vote-btn:active{transform:scale(0.97)}
.vote-btn.yes:hover,.vote-btn.yes:active{border-color:var(--mod-status-open);background:rgba(46,204,113,0.08)}
.vote-btn.no:hover,.vote-btn.no:active{border-color:var(--mod-accent);background:rgba(231,68,42,0.08)}
.vote-btn.voted{pointer-events:none;opacity:0.7}
.vote-btn.voted.winner{opacity:1;border-color:var(--mod-text-heading);background:var(--mod-accent-muted)}

/* RESULTS BAR */
.results-section{display:none;flex-direction:column;gap:10px}
.results-section.show{display:flex}
.vote-bar-track{width:100%;height:36px;border-radius:10px;background:rgba(255,255,255,0.06);overflow:hidden;display:flex;position:relative}
.vote-bar-fill{height:100%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;transition:width 0.6s cubic-bezier(0.16,1,0.3,1);min-width:36px}
.vote-bar-fill.yes-fill{background:rgba(46,204,113,0.25);color:var(--mod-status-open)}
.vote-bar-fill.no-fill{background:rgba(231,68,42,0.25);color:var(--mod-accent)}
.vote-count{text-align:center;font-size:13px;color:var(--mod-text-muted)}

/* HOT TAKES */
.section-label{
  font-family:var(--mod-font-ui);font-size:13px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--mod-bar-secondary);
  margin-top:8px;
}
.takes-list{display:flex;flex-direction:column;gap:10px}
.take-card{
  background:var(--mod-bg-card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);border-radius:14px;
  padding:14px 16px;display:flex;flex-direction:column;gap:6px;
}
.take-author{font-size:13px;color:var(--mod-bar-secondary);font-weight:600}
.take-text{font-size:15px;line-height:1.4;color:var(--mod-text-primary)}
.take-reactions{display:flex;gap:12px;font-size:13px;color:var(--mod-text-muted)}

/* CTA BANNER */
.cta-banner{
  background:linear-gradient(135deg,var(--mod-accent-muted) 0%,rgba(231,68,42,0.08) 100%);
  border:1px solid var(--mod-accent-border);border-radius:18px;
  padding:24px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;
}
.cta-headline{font-family:var(--mod-font-ui);font-size:17px;font-weight:700;letter-spacing:1px;color:var(--mod-text-heading)}
.cta-sub{font-size:14px;color:var(--mod-text-muted);line-height:1.4}
.cta-oauth-row{display:flex;gap:10px;width:100%;max-width:320px}
.oauth-btn{
  flex:1;padding:12px;border-radius:12px;border:none;cursor:pointer;
  font-family:var(--mod-font-ui);font-size:14px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.2s;min-height:48px;
}
.oauth-btn.google{background:#fff;color:#333}
.oauth-btn.apple{background:#000;color:#fff}
.oauth-btn:active{transform:scale(0.96)}
.cta-email-link{font-size:13px;color:var(--mod-text-muted);text-decoration:underline;cursor:pointer}

/* MORE DEBATES */
.more-debates{display:flex;flex-direction:column;gap:12px}
.mini-debate{
  background:var(--mod-bg-card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);border-radius:14px;
  padding:16px;cursor:pointer;transition:all 0.2s;
}
.mini-debate:active{border-color:var(--mod-border-secondary);transform:scale(0.98)}
.mini-topic{font-family:var(--mod-font-ui);font-size:14px;font-weight:700;letter-spacing:0.5px;margin-bottom:6px}
.mini-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--mod-text-muted)}
.mini-cat{color:var(--mod-bar-secondary);font-weight:600;text-transform:uppercase;letter-spacing:1px}

/* WATERMARK (Item 16.5.2) */
.watermark{
  text-align:center;font-size:12px;color:var(--mod-text-muted);
  padding:20px 16px;letter-spacing:0.5px;opacity:0.7;
}
.watermark a{color:var(--mod-bar-secondary);text-decoration:none}

/* SHARE BUTTONS */
.share-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.share-btn{
  padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);color:var(--mod-text-muted);
  font-family:var(--mod-font-ui);font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px;
}
.share-btn:active{background:rgba(255,255,255,0.08);transform:scale(0.96)}

/* CONFETTI */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:9999;animation:confettiFall 1.2s ease-out forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(120vh) rotate(720deg)}}

@media(min-width:768px){
  .container{max-width:580px}
  .debate-topic{font-size:24px}
}

/* === LEGAL FOOTER === */
.colosseum-legal-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10, 17, 40, 0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-top: 1px solid rgba(240, 192, 64, 0.15);
  padding: 10px 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 24px;
  z-index: 9999;
  font-family: var(--mod-font-ui);
  font-size: 0.85rem;
  font-weight: 400;
  letter-spacing: 0.5px;
}
.colosseum-legal-footer a {
  color: var(--mod-text-muted);
  text-decoration: none;
  transition: color 0.2s;
}
.colosseum-legal-footer a:hover {
  color: var(--mod-accent-text);
}
.colosseum-legal-footer .footer-sep {
  color: rgba(240, 192, 64, 0.3);
  font-weight: 300;
}
.colosseum-legal-footer .footer-copy {
  color: var(--mod-text-muted);
}

/* === AI-GENERATED CONTENT BADGE === */
.ai-generated-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(240, 192, 64, 0.1);
  border: 1px solid rgba(240, 192, 64, 0.3);
  border-radius: 6px;
  padding: 6px 14px;
  font-family: var(--mod-font-ui);
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--mod-accent-text);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.ai-generated-badge .ai-icon {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: rgba(240, 192, 64, 0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--mod-accent-text);
  flex-shrink: 0;
}
</style>
