plugins {
    id 'com.android.application'
}

android {
    namespace 'app.themoderator.twa'
    compileSdk 34

    defaultConfig {
        applicationId "app.themoderator.twa"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            storeFile file('../android.keystore')
            storePassword 'themoderator2026'
            keyAlias 'themoderator'
            keyPassword 'themoderator2026'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
