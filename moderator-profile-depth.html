<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="var(--mod-bg-base)">
<title>Complete Your Profile — The Moderator</title>


<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@400;600;700&display=swap');

  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--mod-font-ui);
    background: var(--mod-bg-base);
    color: var(--mod-text-primary);
    min-height: 100dvh;
    padding: calc(16px + var(--safe-top)) 16px calc(80px + var(--safe-bottom));
    -webkit-font-smoothing: antialiased;
  }

  /* === BACK BAR === */
  .back-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .back-btn {
    min-width: 44px; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
    background: var(--mod-bg-base);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--mod-text-primary);
    font-size: 20px;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .page-title {
    font-family: var(--mod-font-ui);
    font-size: 22px;
    letter-spacing: 3px;
  }

  /* === DISCOUNT BANNER === */
  .discount-banner {
    background: linear-gradient(135deg, var(--mod-bg-base), var(--mod-bg-base));
    border: 1px solid var(--mod-bar-secondary);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    text-align: center;
  }
  .discount-current {
    font-family: var(--mod-font-ui);
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--mod-text-heading);
    line-height: 1;
  }
  .discount-original {
    font-size: 14px;
    color: var(--mod-text-muted);
    text-decoration: line-through;
    margin-top: 2px;
  }
  .discount-label {
    font-size: 13px;
    color: var(--mod-text-muted);
    margin-top: 6px;
  }
  .discount-progress {
    width: 100%;
    height: 8px;
    background: var(--mod-bg-base);
    border-radius: 4px;
    margin-top: 10px;
    overflow: hidden;
  }
  .discount-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--mod-bar-secondary), var(--mod-text-heading));
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .discount-pct {
    font-size: 12px;
    color: var(--mod-text-muted);
    margin-top: 4px;
  }

  /* === SECTION GRID === */
  .section-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  @media (min-width: 480px) { .section-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 768px) {
    body { max-width: 640px; margin-left: auto; margin-right: auto; }
    .section-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .section-tile {
    background: var(--mod-bg-base);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    transition: border-color 0.2s;
  }
  .section-tile:active { background: var(--mod-bg-base); }
  .section-tile.complete { border-color: var(--mod-status-open); }
  .section-tile.active-section { border-color: var(--mod-text-heading); }

  .section-icon { font-size: 24px; margin-bottom: 4px; }
  .section-name {
    font-family: var(--mod-font-ui);
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--mod-text-muted);
  }

  /* Mini progress ring */
  .section-ring {
    position: absolute;
    top: 6px; right: 6px;
    width: 22px; height: 22px;
  }
  .section-ring svg { width: 22px; height: 22px; transform: rotate(-90deg); }
  .section-ring circle {
    fill: none;
    stroke-width: 3;
    cx: 11; cy: 11; r: 9;
  }
  .ring-bg { stroke: var(--mod-bg-base); }
  .ring-fill { stroke: var(--mod-text-heading); stroke-linecap: round; transition: stroke-dashoffset 0.6s; }

  .section-check {
    position: absolute;
    top: 6px; right: 6px;
    font-size: 16px;
  }

  /* === QUESTION PANEL === */
  .question-panel {
    display: none;
    margin-bottom: 20px;
  }
  .question-panel.open { display: block; }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .panel-title {
    font-family: var(--mod-font-ui);
    font-size: 18px;
    letter-spacing: 2px;
  }
  .panel-reward {
    font-size: 12px;
    color: var(--mod-text-heading);
    background: var(--mod-accent-muted);
    padding: 4px 10px;
    border-radius: 6px;
  }

  .question-card {
    background: var(--mod-bg-base);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .question-label {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  /* Chips */
  .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--mod-bg-base);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--mod-text-muted);
    font-size: 13px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .chip.selected { background: var(--mod-accent-border); border-color: var(--mod-bar-secondary); color: var(--mod-text-heading); }

  /* Input */
  .q-input {
    width: 100%;
    min-height: 44px;
    padding: 10px 14px;
    background: var(--mod-bg-base);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--mod-text-primary);
    font-family: var(--mod-font-ui);
    font-size: 16px;
    outline: none;
  }
  .q-input:focus { border-color: var(--mod-bar-secondary); }

  /* Slider */
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .q-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: var(--mod-bg-base);
    border-radius: 3px;
    outline: none;
  }
  .q-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    background: var(--mod-text-heading);
    border-radius: 50%;
    cursor: pointer;
  }
  .slider-val {
    font-family: var(--mod-font-ui);
    font-size: 16px;
    color: var(--mod-text-heading);
    min-width: 30px;
    text-align: center;
  }

  /* Select */
  .q-select {
    width: 100%;
    min-height: 44px;
    padding: 10px 14px;
    background: var(--mod-bg-base);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--mod-text-primary);
    font-family: var(--mod-font-ui);
    font-size: 15px;
    outline: none;
    -webkit-appearance: none;
  }

  /* Save section btn */
  .save-section-btn {
    width: 100%;
    min-height: 44px;
    padding: 10px;
    background: var(--mod-bar-secondary);
    color: var(--mod-bg-base);
    border: none;
    border-radius: 8px;
    font-family: var(--mod-font-ui);
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 10px;
  }
  .save-section-btn:active { background: var(--mod-text-heading); }

  /* === REWARD TOAST === */
  .reward-toast {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: var(--mod-bg-base);
    border: 2px solid var(--mod-text-heading);
    border-radius: 16px;
    padding: 24px 32px;
    text-align: center;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
  }
  .reward-toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .reward-toast .reward-icon { font-size: 40px; margin-bottom: 8px; }
  .reward-toast .reward-text {
    font-family: var(--mod-font-ui);
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--mod-text-heading);
  }
  .reward-toast .reward-desc {
    font-size: 13px;
    color: var(--mod-text-muted);
    margin-top: 4px;
  }

  /* === TIER DISPLAY === */
  .tier-banner {
    background: linear-gradient(135deg, var(--mod-bg-base), var(--mod-bg-base));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }
  .tier-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .tier-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tier-rank-label {
    font-family: var(--mod-font-ui);
    font-size: 14px;
    letter-spacing: 1.5px;
    color: var(--mod-text-muted);
  }
  .tier-badge {
    font-weight: 600;
  }
  .tier-unlock-hint {
    font-size: 12px;
    color: var(--mod-text-muted);
    margin-bottom: 6px;
  }
  .tier-unlock-hint strong {
    color: var(--mod-text-heading);
  }
  .tier-progress {
    margin-top: 2px;
  }
  .tier-progress-label {
    font-size: 12px;
    color: var(--mod-text-muted);
    margin-bottom: 4px;
  }
  .tier-progress-bar {
    width: 100%;
    height: 6px;
    background: var(--mod-bg-base);
    border-radius: 3px;
    overflow: hidden;
  }
  .tier-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--mod-bar-secondary), var(--mod-text-heading));
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .tier-progress-complete {
    font-family: var(--mod-font-ui);
    font-size: 14px;
    color: var(--mod-text-heading);
    letter-spacing: 1px;
  }
  .tier-perks {
    margin-top: 8px;
    font-size: 11px;
    color: var(--mod-text-muted);
  }
  .tier-perks span {
    color: var(--mod-text-heading);
  }

  /* === LEGAL FOOTER === */
  .moderator-legal-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10, 17, 40, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-top: 1px solid rgba(240, 192, 64, 0.15);
    padding: 10px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    z-index: 9999;
    font-family: var(--mod-font-ui);
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .moderator-legal-footer a {
    color: var(--mod-text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .moderator-legal-footer a:hover {
    color: var(--mod-accent-text);
  }
  .moderator-legal-footer .footer-sep {
    color: rgba(240, 192, 64, 0.3);
    font-weight: 300;
  }
  .moderator-legal-footer .footer-copy {
    color: var(--mod-text-muted);
  }
</style>
<link rel="stylesheet" href="/src/moderator-tokens.css">
</head>
<body>

<div class="back-bar">
  <a href="index.html" class="back-btn">←</a>
  <div class="page-title">COMPLETE PROFILE</div>
</div>

<!-- Discount waterfall banner -->
<div class="discount-banner">
  <div class="discount-original">$14.99/mo</div>
  <div class="discount-current" id="discount-price">$14.99<span style="font-size:14px;color:var(--mod-text-muted);">/mo</span></div>
  <div class="discount-label">Complete sections to unlock your discount</div>
  <div class="discount-progress">
    <div class="discount-fill" id="discount-fill" style="width:0%"></div>
  </div>
  <div class="discount-pct" id="discount-pct">0 of 12 sections complete</div>
</div>

<!-- Tier display (Session 117: Token Staking Phase 1) -->
<div class="tier-banner" id="tier-banner" style="display:none;"></div>

<!-- Section tiles grid -->
<div class="section-grid" id="section-grid"></div>

<!-- Question panel (opens when section tapped) -->
<div class="question-panel" id="question-panel"></div>

<!-- Reward toast -->
<div class="reward-toast" id="reward-toast">
  <div class="reward-icon" id="reward-icon">🏆</div>
  <div class="reward-text" id="reward-text">SECTION COMPLETE</div>
  <div class="reward-desc" id="reward-desc">You unlocked a badge!</div>
</div>

<script type="module" src="/src/pages/profile-depth.ts"></script>
<div class="moderator-legal-footer">
  <a href="moderator-privacy.html">Privacy Policy</a>
  <span class="footer-sep">|</span>
  <a href="moderator-terms.html">Terms of Service</a>
  <span class="footer-sep">|</span>
  <span class="footer-copy">&copy; 2026 The Moderator</span>
</div>
</body>
</html>
