  header h1{font-size:14px;font-weight:600;color:#fff;white-space:nowrap}
  .stats{display:flex;gap:12px;font-size:12px;color:#9ca3af;margin-left:auto;flex-wrap:wrap}
  .stat span{font-weight:600}
  .stat .pass{color:#1D9E75}
  .stat .fail{color:#E24B4A}
  .stat .skip{color:#888780}
  .progress-bar{height:3px;background:#2a2d3a;position:sticky;top:45px;z-index:99}
  .progress-fill{height:100%;background:#1D9E75;transition:width 0.3s;width:0%}
  .section{margin:24px 20px 0}
  .section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;cursor:pointer;user-select:none}
  .section-header h2{font-size:13px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:0.05em}
  .section-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:#2a2d3a;color:#9ca3af}
  .section-toggle{margin-left:auto;font-size:11px;color:#6b7280}
  .section-body{display:flex;flex-direction:column;gap:4px}
  .section-body.collapsed{display:none}
  .item{display:grid;grid-template-columns:80px 1fr auto;gap:8px;align-items:start;background:#1a1d27;border:1px solid #2a2d3a;border-radius:6px;padding:10px 12px;transition:border-color 0.15s}
  .item.pass{border-color:#1D9E75;background:#0d1f19}
  .item.fail{border-color:#E24B4A;background:#1f0d0d}
  .item.skip{border-color:#444;opacity:0.5}
  .item-action{font-size:12px;font-weight:500;color:#e2e2e2;line-height:1.5}
  .item-action .tag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;margin-right:4px;vertical-align:middle}
  .tag.tap{background:#185FA5;color:#B5D4F4}
  .tag.type{background:#3B6D11;color:#C0DD97}
  .tag.verify{background:#854F0B;color:#FAC775}
  .tag.navigate{background:#534AB7;color:#CECBF6}
  .tag.wait{background:#3d3d3a;color:#9ca3af}
  .item-note{grid-column:1/-1;margin-top:6px}
  .item-note textarea{width:100%;background:#0f1117;border:1px solid #3a3d4a;border-radius:4px;color:#e2e2e2;font-size:11px;padding:6px 8px;resize:vertical;min-height:44px;font-family:inherit}
  .item-note textarea::placeholder{color:#4b5563}
  .item-note textarea:focus{outline:none;border-color:#534AB7}
  .item-controls{display:flex;gap:4px;align-items:center;flex-shrink:0}
  .btn{padding:4px 9px;border-radius:4px;border:1px solid #3a3d4a;background:#1a1d27;color:#9ca3af;cursor:pointer;font-size:11px;font-weight:500;transition:all 0.1s}
  .btn:hover{background:#2a2d3a;color:#e2e2e2}
  .btn.active-pass{background:#0d3320;border-color:#1D9E75;color:#1D9E75}
  .btn.active-fail{background:#3a0d0d;border-color:#E24B4A;color:#E24B4A}
  .btn.active-skip{background:#1a1d27;border-color:#444;color:#444}
  .divider{height:1px;background:#2a2d3a;margin:8px 0}
  .sub-section{margin-left:12px;margin-top:4px;padding-left:12px;border-left:2px solid #2a2d3a}
  .sub-label{font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;margin:8px 0 4px}
  .export-btn{position:fixed;bottom:20px;right:20px;background:#534AB7;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
  .export-btn:hover{background:#7F77DD}
  .item-id{font-size:10px;color:#4b5563;font-family:monospace;line-height:1.8}
</style>

// State
const state = {};
let total = 0;

function init() {
  const app = document.getElementById('app');
  SECTIONS.forEach(sec => {
    total += sec.items.length;
    sec.items.forEach(item => { state[item.id] = { status: null, note: '' }; });

    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `
      <div class="section-header" onclick="toggleSection('${sec.id}')">
        <h2>${sec.title}</h2>
        <span class="section-badge" id="badge-${sec.id}">${sec.items.length} items</span>
        <span class="section-toggle" id="tog-${sec.id}">▾</span>
      </div>
      <div class="section-body" id="body-${sec.id}">
        ${sec.items.map(item => `
          <div class="item" id="item-${item.id}">
            <span class="item-id">${item.id}</span>
            <span class="item-action"><span class="tag ${item.tag}">${item.tag}</span>${item.action}</span>
            <div class="item-controls">
              <button class="btn" onclick="setStatus('${item.id}','pass')">✓</button>
              <button class="btn" onclick="setStatus('${item.id}','fail')">✗</button>
              <button class="btn" onclick="setStatus('${item.id}','skip')">—</button>
            </div>
            <div class="item-note">
              <textarea placeholder="${item.note || 'Notes...'}" oninput="saveNote('${item.id}',this.value)"></textarea>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    app.appendChild(div);
  });
  updateStats();
}

function toggleSection(id) {
  const body = document.getElementById('body-'+id);
  const tog = document.getElementById('tog-'+id);
  const collapsed = body.classList.toggle('collapsed');
  tog.textContent = collapsed ? '▸' : '▾';
}

function setStatus(id, status) {
  state[id].status = state[id].status === status ? null : status;
  const item = document.getElementById('item-'+id);
  item.className = 'item' + (state[id].status ? ' '+state[id].status : '');
  // Update buttons
  const btns = item.querySelectorAll('.btn');
  btns[0].className = 'btn' + (state[id].status==='pass'?' active-pass':'');
  btns[1].className = 'btn' + (state[id].status==='fail'?' active-fail':'');
  btns[2].className = 'btn' + (state[id].status==='skip'?' active-skip':'');
  updateStats();
  save();
}

function saveNote(id, val) {
  state[id].note = val;
  save();
}

function updateStats() {
  let pass=0, fail=0, skip=0;
  Object.values(state).forEach(s => {
    if(s.status==='pass') pass++;
    else if(s.status==='fail') fail++;
    else if(s.status==='skip') skip++;
  });
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-pass').textContent = pass;
  document.getElementById('s-fail').textContent = fail;
  document.getElementById('s-skip').textContent = skip;
  document.getElementById('s-rem').textContent = total - pass - fail - skip;
  document.getElementById('progress').style.width = ((pass+fail+skip)/total*100).toFixed(1)+'%';

  // Update section badges
  SECTIONS.forEach(sec => {
    const done = sec.items.filter(i => state[i.id].status).length;
    const fails = sec.items.filter(i => state[i.id].status==='fail').length;
    const badge = document.getElementById('badge-'+sec.id);
    badge.textContent = done === sec.items.length ? '✓ done' : `${done}/${sec.items.length}`;
    badge.style.background = fails > 0 ? '#3a0d0d' : done === sec.items.length ? '#0d3320' : '#2a2d3a';
    badge.style.color = fails > 0 ? '#E24B4A' : done === sec.items.length ? '#1D9E75' : '#9ca3af';
  });
}

function save() {
  try { localStorage.setItem('colosseum-test-state', JSON.stringify(state)); } catch(e){}
}

function load() {
  try {
    const saved = localStorage.getItem('colosseum-test-state');
    if (!saved) return;
    const s = JSON.parse(saved);
    Object.keys(s).forEach(id => {
      if (!state[id]) return;
      state[id] = s[id];
      if (s[id].status) {
        const item = document.getElementById('item-'+id);
        if (!item) return;
        item.className = 'item '+s[id].status;
        const btns = item.querySelectorAll('.btn');
        btns[0].className = 'btn'+(s[id].status==='pass'?' active-pass':'');
        btns[1].className = 'btn'+(s[id].status==='fail'?' active-fail':'');
        btns[2].className = 'btn'+(s[id].status==='skip'?' active-skip':'');
      }
      if (s[id].note) {
        const ta = document.querySelector('#item-'+id+' textarea');
        if (ta) ta.value = s[id].note;
      }
    });
    updateStats();
  } catch(e){}
}

function exportResults() {
  const lines = ['# Colosseum Live Run Results', `Date: ${new Date().toISOString()}`, ''];
  let pass=0,fail=0,skip=0;
  SECTIONS.forEach(sec => {
    lines.push(`## ${sec.title}`);
    sec.items.forEach(item => {
      const s = state[item.id];
      const status = s.status ? s.status.toUpperCase() : 'PENDING';
      if(s.status==='pass') pass++;
      else if(s.status==='fail') fail++;
      else if(s.status==='skip') skip++;
      lines.push(`[${status}] ${item.id} — ${item.action}`);
      if(s.note) lines.push(`  Note: ${s.note}`);
    });
    lines.push('');
  });
  lines.unshift(`Pass: ${pass} | Fail: ${fail} | Skip: ${skip} | Pending: ${total-pass-fail-skip}`, '');
  const blob = new Blob([lines.join('\n')], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `colosseum-live-run-${new Date().toISOString().slice(0,10)}.md`;
  a.click();
}

init();
load();
</script>
