    const tierNodes=NODE_DATA.filter(x=>x.t===tier);
    const ii=tierNodes.findIndex(x=>x.f===nd.f);
    const r=RINGS[Math.min(tier,4)];
    let x,y;
    if(tier===0&&r===0){
      const angle=(ii/tierNodes.length)*Math.PI*2-Math.PI/2;
      x=cx+Math.cos(angle)*42; y=cy+Math.sin(angle)*42;
    } else {
      const angle=(ii/tierNodes.length)*Math.PI*2-Math.PI/2+(tier*0.25);
      const jitter=(Math.sin(idx*7.3)*0.1+Math.cos(idx*3.7)*0.07)*r;
      x=cx+Math.cos(angle)*(r+jitter);
      y=cy+Math.sin(angle)*(r+jitter);
    }
    const node={...nd,x,y};
    nodes.push(node);
    nodeMap[nd.f]=node;
  });
}

function nr(n){
  if(n.t===0)return Math.min(20,8+n.i/11);
  if(n.t===1)return Math.min(13,5+n.i/7);
  if(n.t===2)return Math.min(9,4+n.i/9);
  return 4;
}

function draw(forExport){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  if(forExport){ctx.fillStyle='#0f1117';ctx.fillRect(0,0,cv.width,cv.height);}
  ctx.save();
  ctx.translate(ox,oy);
  ctx.scale(sc,sc);

  const CX=cv.width/2, CY=cv.height/2+20;
  const RINGS=[0,95,185,295,415];
  const RLABELS=['Foundation','Core','Subsystem','Feature','Leaf'];

  // Ring guides
  RINGS.forEach((r,i)=>{
    if(r===0)return;
    ctx.beginPath();ctx.arc(CX,CY,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
    ctx.setLineDash([3,7]);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(255,255,255,0.18)';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText(RLABELS[i],CX,CY-r+13);
  });

  // Center label
  ctx.fillStyle='rgba(255,255,255,0.12)';ctx.font='9px sans-serif';ctx.textAlign='center';
  ctx.fillText('338 files · 1,207 edges → 263 critical paths',CX,CY+RINGS[4]+36);

  let pathNodes=new Set(),pathEdges=new Set();
  if(selected!==null){
    const snn=nodes[selected];
    pathNodes.add(snn.f);
    CRITICAL_EDGES.forEach(([a,b])=>{
      if(a===snn.f){pathNodes.add(b);pathEdges.add(a+'→'+b);}
      if(b===snn.f){pathNodes.add(a);pathEdges.add(a+'→'+b);}
    });
  }

  // Edges
  CRITICAL_EDGES.forEach(([a,b])=>{
    const na=nodeMap[a],nb=nodeMap[b];
    if(!na||!nb)return;
    const hi=pathEdges.has(a+'→'+b);
    const dim=selected!==null&&!hi;
    ctx.globalAlpha=dim?0.04:hi?0.95:0.18;
    const mx=(na.x+nb.x)/2+(nb.y-na.y)*0.18;
    const my=(na.y+nb.y)/2-(nb.x-na.x)*0.18;
    ctx.beginPath();ctx.moveTo(na.x,na.y);
    ctx.quadraticCurveTo(mx,my,nb.x,nb.y);
    ctx.strokeStyle=hi?TIER_COLORS[na.t]:'rgba(200,200,200,0.8)';
    ctx.lineWidth=hi?2.5:0.7;ctx.stroke();
    ctx.globalAlpha=1;
  });

  // Nodes
  nodes.forEach((n,ni)=>{
    const r=nr(n);
    const isSel=ni===selected;
    const inPath=pathNodes.has(n.f);
    const dim=selected!==null&&!inPath;
    ctx.globalAlpha=dim?0.15:1;
    // Glow for selected
    if(isSel){
      ctx.beginPath();ctx.arc(n.x,n.y,r+8,0,Math.PI*2);
      ctx.fillStyle=TIER_COLORS[n.t]+'33';ctx.fill();
    }
    ctx.beginPath();ctx.arc(n.x,n.y,r+(isSel?2:0),0,Math.PI*2);
    ctx.fillStyle=TIER_COLORS[n.t];ctx.fill();
    if(isSel||inPath){ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();}
    if(n.t<=1||(inPath&&selected!==null)){
      ctx.fillStyle=dim?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.88)';
      ctx.font=(n.t===0?'600 ':'')+(n.t===0?'11px':'10px')+' sans-serif';
      ctx.textAlign='center';
      ctx.fillText(sn(n.f),n.x,n.y+r+10);
    }
    ctx.globalAlpha=1;
  });

  ctx.restore();
}

function hit(ex,ey){
  const cv=document.getElementById('cv');
  const rect=cv.getBoundingClientRect();
  const mx=(ex-rect.left-ox)/sc,my=(ey-rect.top-oy)/sc;
  let best=-1,bestD=Infinity;
  nodes.forEach((n,i)=>{
    const d=Math.hypot(mx-n.x,my-n.y);
    if(d<Math.max(nr(n)+8,12)&&d<bestD){bestD=d;best=i;}
  });
  return best;
}

function setInfo(ni){
  const el=document.getElementById('info');
  if(ni<0){el.innerHTML='Click any node to highlight its critical path. Drag to pan · Scroll to zoom · Double-click canvas to clear.';return;}
  const n=nodes[ni];
  const edge=CRITICAL_EDGES.find(([a])=>a===n.f);
  const target=edge?sn(edge[1]):'root node';
  el.innerHTML=`<strong>${n.f.split('/').pop()}</strong> &nbsp;·&nbsp; Tier ${n.t} ${TIER_NAMES[n.t]} &nbsp;·&nbsp; imported by <strong>${n.i}</strong> files &nbsp;·&nbsp; imports <strong>${n.o}</strong> files &nbsp;·&nbsp; critical dep → <strong>${target}</strong>`;
}

function exportPNG(){
  const cv=document.getElementById('cv');
  const tmp=document.createElement('canvas');
  tmp.width=cv.width;tmp.height=cv.height;
  const tctx=tmp.getContext('2d');
  tctx.drawImage(cv,0,0);
  // redraw with bg
  const origOx=ox,origOy=oy,origSc=sc;
  draw(true);
  const link=document.createElement('a');
  link.download='colosseum-critical-path.png';
  link.href=cv.toDataURL('image/png');
  link.click();
  draw(false);
}

const wrap=document.getElementById('cv-wrap');
wrap.addEventListener('mousedown',e=>{
  const ni=hit(e.clientX,e.clientY);
  if(ni>=0){selected=ni;setInfo(ni);draw();return;}
  drag=true;dsx=e.clientX;dsy=e.clientY;dox=ox;doy=oy;
});
wrap.addEventListener('mousemove',e=>{
  if(drag){ox=dox+(e.clientX-dsx);oy=doy+(e.clientY-dsy);draw();return;}
  const ni=hit(e.clientX,e.clientY);
  const tt=document.getElementById('tt');
  const rect=wrap.getBoundingClientRect();
  if(ni>=0){
    const n=nodes[ni];
    const edge=CRITICAL_EDGES.find(([a])=>a===n.f);
    tt.style.display='block';
    tt.style.left=Math.min(e.clientX-rect.left+14,rect.width-290)+'px';
    tt.style.top=Math.min(e.clientY-rect.top+14,rect.height-100)+'px';
    tt.innerHTML=`<strong>${n.f.split('/').pop()}</strong><br><span class="sub">${n.f}</span><br>Tier ${n.t} ${TIER_NAMES[n.t]} &nbsp;·&nbsp; in: ${n.i} &nbsp;·&nbsp; out: ${n.o}<br>Critical dep: <strong>${edge?edge[1].split('/').pop():'root'}</strong>`;
  } else {tt.style.display='none';}
});
wrap.addEventListener('mouseup',()=>{drag=false;});
wrap.addEventListener('mouseleave',()=>{drag=false;document.getElementById('tt').style.display='none';});
wrap.addEventListener('dblclick',()=>{selected=null;setInfo(-1);draw();});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  sc*=e.deltaY<0?1.12:0.89;sc=Math.max(0.15,Math.min(6,sc));draw();
},{passive:false});

window.doZoom=f=>{sc=Math.max(0.15,Math.min(6,sc*f));draw();};
window.doReset=()=>{ox=0;oy=0;sc=1;draw();};
window.exportPNG=exportPNG;

function init(){
  const cv=document.getElementById('cv');
  const w=wrap.offsetWidth,h=wrap.offsetHeight;
  cv.width=w;cv.height=h;
  layout();draw();
}
window.addEventListener('resize',()=>{
  const cv=document.getElementById('cv');
  cv.width=wrap.offsetWidth;cv.height=wrap.offsetHeight;
  layout();draw();
});
init();
</script>
</body>
