<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000" id="meta-theme-color">
<script>(function(){var d=document.documentElement;var s=localStorage.getItem("theme");var t=s||(window.matchMedia("(prefers-color-scheme:light)").matches?"light":"dark");d.setAttribute("data-theme",t);if(t==="light"){var m=document.getElementById("meta-theme-color");if(m)m.content="#eaeef2";}})()</script>
<title>The Moderator — Groups</title>


<style>
@import url('https://fonts.googleapis.com/css2?family=Antonio:wght@100..700&display=swap');

:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--mod-font-ui);
  background: var(--mod-bg-base);
  color: var(--mod-text-primary);
  min-height: 100dvh;
  display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
  padding-bottom: 56px;
}

/* ── TOP BAR ── */
.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: var(--mod-bg-overlay);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--mod-border-primary);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  display: flex; align-items: center; gap: 12px;
}

.back-btn {
  width: 36px; height: 36px;
  background: var(--mod-bg-elevated);
  border: 1px solid var(--mod-border-primary);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--mod-text-primary); font-size: 18px;
  flex-shrink: 0;
}
.back-btn:active { background: var(--mod-bg-card-active); }

.top-bar-title {
  font-family: var(--mod-font-ui);
  font-size: 20px; font-weight: 700;
  color: var(--mod-text-heading);
  letter-spacing: 2px;
  flex: 1;
}

.create-btn {
  background: var(--mod-text-heading);
  color: var(--mod-bg-base);
  border: none; border-radius: 20px;
  padding: 8px 16px;
  font-family: var(--mod-font-ui);
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  flex-shrink: 0;
}
.create-btn:active { background: var(--mod-bar-secondary); }

/* ── TABS ── */
.tabs {
  display: flex; border-bottom: 1px solid var(--mod-border-primary);
  background: var(--mod-bg-overlay);
  position: sticky; top: 64px; z-index: 90;
}
.tab-btn {
  flex: 1; padding: 12px 8px;
  background: none; border: none;
  color: var(--mod-text-muted);
  font-family: var(--mod-font-ui);
  font-size: 13px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.tab-btn.active { color: var(--mod-text-heading); border-bottom-color: var(--mod-text-heading); }

/* ── CATEGORY FILTER ── */
.category-filter {
  display: flex; gap: 8px; padding: 12px 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.category-filter::-webkit-scrollbar { display: none; }
.cat-pill {
  flex-shrink: 0;
  background: var(--mod-bg-elevated);
  border: 1px solid var(--mod-border-primary);
  border-radius: 16px; padding: 6px 14px;
  font-family: var(--mod-font-ui); font-size: 12px;
  font-weight: 600; letter-spacing: 0.5px;
  color: var(--mod-text-muted); cursor: pointer;
  transition: all 0.2s;
}
.cat-pill.active {
  background: var(--mod-accent-border);
  border-color: var(--mod-text-heading);
  color: var(--mod-text-heading);
}

/* ── CONTENT AREA ── */
.content {
  flex: 1; overflow-y: auto;
  padding: 12px 16px calc(80px + var(--safe-bottom));
}

/* ── GROUP CARD ── */
.group-card {
  background: var(--mod-bg-card);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--mod-border-primary);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: border-color 0.2s;
}
.group-card:active { border-color: var(--mod-border-accent); }

.group-emoji {
  font-size: 32px; flex-shrink: 0;
  width: 52px; height: 52px;
  background: var(--mod-bg-control);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}
.group-info { flex: 1; min-width: 0; }
.group-name {
  font-size: 16px; font-weight: 700;
  color: var(--mod-text-primary); letter-spacing: 0.3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.group-desc {
  font-size: 13px; color: var(--mod-text-muted);
  margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.group-meta {
  display: flex; align-items: center; gap: 10px;
  margin-top: 6px;
}
.meta-pill {
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 8px;
  letter-spacing: 0.3px;
}
.meta-pill.cat {
  background: var(--mod-accent-muted); color: var(--mod-accent-text);
  border: 1px solid var(--mod-accent-border);
}
.meta-pill.members {
  background: var(--mod-bg-control); color: var(--mod-text-muted);
}
.group-elo {
  flex-shrink: 0; text-align: right;
}
.elo-num {
  font-family: var(--mod-font-ui);
  font-size: 18px; font-weight: 700;
  color: var(--mod-text-heading);
}
.elo-label { font-size: 10px; color: var(--mod-text-muted); letter-spacing: 0.5px; }

/* My Groups badge */
.my-role-badge {
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 8px;
  letter-spacing: 0.5px;
}
.my-role-badge.owner { background: var(--mod-accent-border); color: var(--mod-text-heading); }
.my-role-badge.member { background: var(--mod-status-open-bg); color: var(--mod-status-open); }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 60px 20px;
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 20px; font-weight: 700; color: var(--mod-text-muted); margin-bottom: 6px; }
.empty-sub { font-size: 14px; color: var(--mod-text-muted); opacity: 0.6; }

/* ── GROUP DETAIL ── */
#view-detail { display: none; }

.detail-header {
  background: var(--mod-bg-card);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--mod-border-primary);
  padding: 20px 16px 16px;
  text-align: center;
}
.detail-emoji { font-size: 52px; margin-bottom: 8px; }
.detail-name {
  font-family: var(--mod-font-ui);
  font-size: 22px; font-weight: 700;
  color: var(--mod-text-heading); letter-spacing: 2px;
}
.detail-desc { font-size: 14px; color: var(--mod-text-muted); margin-top: 4px; }
.detail-stats {
  display: flex; justify-content: center; gap: 24px;
  margin-top: 12px;
}
.detail-stat { text-align: center; }
.detail-stat-num {
  font-family: var(--mod-font-ui); font-size: 22px;
  font-weight: 700; color: var(--mod-text-primary);
}
.detail-stat-num.gold { color: var(--mod-text-heading); }
.detail-stat-label { font-size: 11px; color: var(--mod-text-muted); letter-spacing: 0.5px; }

.join-btn {
  display: block; width: calc(100% - 32px);
  margin: 14px 16px 0;
  padding: 14px; border-radius: 10px;
  font-family: var(--mod-font-ui); font-size: 16px; font-weight: 700;
  letter-spacing: 1px; cursor: pointer; border: none;
  transition: opacity 0.2s;
}
.join-btn.join { background: var(--mod-text-heading); color: var(--mod-bg-base); }
.join-btn.leave {
  background: var(--mod-bg-control);
  border: 1px solid var(--mod-border-primary);
  color: var(--mod-text-muted);
}
.join-btn:active { opacity: 0.75; }

.detail-tabs { top: 64px; } /* sticky offset for detail view */

/* ── MEMBER ROW ── */
.member-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--mod-border-secondary);
}
.member-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--mod-bg-elevated);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  overflow: hidden;
}
.member-avatar img { width: 100%; height: 100%; object-fit: cover; }
.member-info { flex: 1; min-width: 0; }
.member-name { font-size: 14px; font-weight: 700; }
.member-elo { font-size: 12px; color: var(--mod-text-muted); }
.member-role { flex-shrink: 0; }

/* ── HOT TAKE IN GROUP ── */
.group-take {
  background: var(--mod-bg-subtle);
  border: 1px solid var(--mod-border-primary);
  border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px;
}
.take-author { font-size: 12px; color: var(--mod-text-heading); font-weight: 600; margin-bottom: 4px; }
.take-content { font-size: 15px; line-height: 1.4; }

/* ── CREATE MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: var(--mod-bg-overlay);
  backdrop-filter: blur(4px);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal-sheet {
  width: 100%; background: var(--mod-bg-modal);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--mod-border-primary);
  padding: 0 20px calc(24px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }

.modal-handle {
  width: 36px; height: 4px;
  background: var(--mod-text-muted);
  border-radius: 2px; margin: 12px auto 20px;
}
.modal-title {
  font-family: var(--mod-font-ui);
  font-size: 18px; font-weight: 700;
  color: var(--mod-text-heading); letter-spacing: 2px;
  margin-bottom: 20px;
}

.form-field { margin-bottom: 14px; }
.form-label {
  font-size: 12px; font-weight: 700;
  letter-spacing: 1px; color: var(--mod-text-muted);
  text-transform: uppercase; margin-bottom: 6px; display: block;
}
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--mod-bg-control);
  border: 1px solid var(--mod-border-primary);
  border-radius: 8px; padding: 12px 14px;
  color: var(--mod-text-primary);
  font-family: var(--mod-font-ui); font-size: 15px;
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--mod-border-accent);
}
.form-select { appearance: none; -webkit-appearance: none; }
.form-textarea { resize: none; height: 80px; }

.emoji-picker {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.emoji-opt {
  width: 42px; height: 42px; border-radius: 8px; font-size: 22px;
  background: var(--mod-bg-control);
  border: 2px solid transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: border-color 0.15s;
}
.emoji-opt.selected { border-color: var(--mod-text-heading); background: var(--mod-accent-border); }

.submit-btn {
  width: 100%; padding: 16px;
  background: var(--mod-text-heading); color: var(--mod-bg-base);
  border: none; border-radius: 10px;
  font-family: var(--mod-font-ui); font-size: 16px; font-weight: 700;
  letter-spacing: 1px; cursor: pointer; margin-top: 8px;
}
.submit-btn:active { background: var(--mod-bar-secondary); }
.submit-btn:disabled { opacity: 0.5; pointer-events: none; }

/* ── GVG CHALLENGE ── */
.gvg-challenge-btn {
  display: none; width: calc(100% - 32px);
  margin: 8px 16px 0;
  padding: 12px; border-radius: 10px;
  background: linear-gradient(135deg, var(--mod-accent), var(--mod-magenta-dark));
  color: var(--mod-text-on-accent); border: none;
  font-family: var(--mod-font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: 1px; cursor: pointer;
}
.gvg-challenge-btn:active { opacity: 0.75; }
.challenge-card {
  background: var(--mod-bg-subtle);
  border: 1px solid var(--mod-border-primary);
  border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px;
}
.gvg-modal-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center;
}
.gvg-modal-overlay.open { display: flex; }
.gvg-modal-sheet {
  background: var(--mod-bg-modal); border: 1px solid var(--mod-accent-border);
  border-radius: 14px; max-width: 420px; width: 90%;
  max-height: 85vh; overflow-y: auto; padding: 24px;
}
.gvg-format-pills { display: flex; gap: 8px; margin-bottom: 16px; }
.gvg-format-pill {
  flex: 1; padding: 10px; border-radius: 8px;
  font-family: var(--mod-font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: 1px; cursor: pointer;
  border: 1px solid var(--mod-border-primary);
  background: transparent; color: var(--mod-text-muted);
  transition: all 0.15s;
}
.gvg-format-pill.active {
  background: var(--mod-accent-border);
  border-color: var(--mod-accent-border);
  color: var(--mod-text-heading);
}
.gvg-opponent-option {
  display: flex; align-items: center; gap: 8px;
  padding: 8px; cursor: pointer; border-radius: 6px;
  transition: background 0.15s;
}
.gvg-opponent-option:hover { background: var(--mod-accent-muted); }

/* ── LOADING ── */
.loading-state { text-align: center; padding: 40px; color: var(--mod-text-muted); }

/* ── BOTTOM TAB BAR ── */
.mod-tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 56px;
  background: var(--mod-bar-primary, rgba(6,6,8,0.75));
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  z-index: 200;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
}
.mod-tab-bar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 5%, var(--mod-magenta) 30%, var(--mod-cyan) 70%, transparent 95%);
  box-shadow: 0 0 10px var(--mod-cyan-glow);
}
.mod-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border: none;
  background: none;
  color: var(--mod-text-muted);
  font-family: var(--mod-font-ui);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  text-decoration: none;
  transition: color 0.15s, text-shadow 0.15s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.mod-tab.active {
  color: var(--mod-cyan);
  text-shadow: 0 0 12px var(--mod-cyan-glow);
}
.mod-tab.active::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--mod-cyan);
  box-shadow: 0 0 10px var(--mod-cyan-glow), 0 2px 14px var(--mod-cyan-glow);
}
.mod-tab:active { opacity: 0.6; }
.mod-tab-icon { font-size: 20px; line-height: 1; }

@media (min-width: 768px) { body { max-width: 640px; margin-left: auto; margin-right: auto; } }
</style>

<body>

<!-- ══ LOBBY VIEW ══════════════════════════════════════════ -->
<div id="view-lobby">

  <div class="top-bar">
    <div class="top-bar-title">GROUPS</div>
    <button class="create-btn" onclick="openCreateModal()">+ CREATE</button>
  </div>

  <div class="tabs" id="lobby-tabs">
    <button class="tab-btn active" onclick="switchTab('discover')">Discover</button>
    <button class="tab-btn" onclick="switchTab('mine')">My Groups</button>
    <button class="tab-btn" onclick="switchTab('leaderboard')">Rankings</button>
  </div>

  <!-- Discover tab -->
  <div id="tab-discover">
    <div class="category-filter" id="cat-filter">
      <div class="cat-pill active" onclick="filterCategory(null, this)">All</div>
      <div class="cat-pill" onclick="filterCategory('politics', this)">🏛️ Politics</div>
      <div class="cat-pill" onclick="filterCategory('sports', this)">🏆 Sports</div>
      <div class="cat-pill" onclick="filterCategory('entertainment', this)">🎬 Entertainment</div>
      <div class="cat-pill" onclick="filterCategory('music', this)">🎵 Music</div>
      <div class="cat-pill" onclick="filterCategory('couples_court', this)">💔 Couples Court</div>
    </div>
    <div class="content" id="discover-list">
      <div class="loading-state">Loading groups…</div>
    </div>
  </div>

  <!-- My Groups tab -->
  <div id="tab-mine" style="display:none;">
    <div class="content" id="mine-list">
      <div class="loading-state">Loading…</div>
    </div>
  </div>

  <!-- Leaderboard tab -->
  <div id="tab-leaderboard" style="display:none;">
    <div class="content" id="leaderboard-list">
      <div class="loading-state">Loading…</div>
    </div>
  </div>

</div>


<!-- ══ DETAIL VIEW ═════════════════════════════════════════ -->
<div id="view-detail" style="display:none; flex-direction:column; min-height:100dvh;">

  <div class="top-bar">
    <div class="back-btn" onclick="showLobby()">←</div>
    <div class="top-bar-title" id="detail-top-name">GROUP</div>
    <div style="width:36px;"></div>
  </div>

  <div class="detail-header">
    <div class="detail-emoji" id="detail-emoji">⚔️</div>
    <div class="detail-name" id="detail-name">Loading…</div>
    <div class="detail-desc" id="detail-desc"></div>
    <div class="detail-stats">
      <div class="detail-stat">
        <div class="detail-stat-num" id="detail-members">—</div>
        <div class="detail-stat-label">MEMBERS</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-num gold" id="detail-elo">—</div>
        <div class="detail-stat-label">GROUP ELO</div>
      </div>
    </div>
  </div>

  <button class="join-btn join" id="join-btn" onclick="toggleMembership()">JOIN GROUP</button>
  <!-- E211: Group hot take posting — WIRED (Session 105)
       E212/E215: Group vs Group (GvG) — WIRED (Session 116) -->
  <button class="gvg-challenge-btn" id="gvg-challenge-btn" onclick="openGvGModal()">⚔️ CHALLENGE ANOTHER GROUP</button>

  <div class="tabs detail-tabs" id="detail-tabs">
    <button class="tab-btn active" onclick="switchDetailTab('hot-takes')">Hot Takes</button>
    <button class="tab-btn" onclick="switchDetailTab('challenges')">Challenges</button>
    <button class="tab-btn" onclick="switchDetailTab('members')">Members</button>
  </div>

  <div class="content">
    <div id="detail-hot-takes">
      <div class="loading-state">Loading hot takes…</div>
    </div>
    <div id="detail-challenges" style="display:none;">
      <div class="loading-state">Loading challenges…</div>
    </div>
    <div id="detail-members-list" style="display:none;">
      <div class="loading-state">Loading members…</div>
    </div>
  </div>

</div>


<!-- ══ CREATE MODAL ════════════════════════════════════════ -->
<div class="modal-overlay" id="create-modal" onclick="handleModalBackdrop(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">CREATE GROUP</div>

    <div class="form-field">
      <label class="form-label">Name</label>
      <input class="form-input" id="group-name" type="text" placeholder="Keyboard Warriors, Sports Bros…" maxlength="50">
    </div>

    <div class="form-field">
      <label class="form-label">Description (optional)</label>
      <textarea class="form-textarea" id="group-desc-input" placeholder="What does this group debate about?"></textarea>
    </div>

    <div class="form-field">
      <label class="form-label">Category</label>
      <select class="form-select" id="group-category">
        <option value="general">General</option>
        <option value="politics">Politics</option>
        <option value="sports">Sports</option>
        <option value="entertainment">Entertainment</option>
        <option value="music">Music</option>
        <option value="couples_court">Couples Court</option>
      </select>
    </div>

    <div class="form-field">
      <label class="form-label">Group Emoji</label>
      <div class="emoji-picker" id="emoji-picker">
        <div class="emoji-opt selected" data-emoji="⚔️" onclick="selectEmoji(this)">⚔️</div>
        <div class="emoji-opt" data-emoji="🔥" onclick="selectEmoji(this)">🔥</div>
        <div class="emoji-opt" data-emoji="🏆" onclick="selectEmoji(this)">🏆</div>
        <div class="emoji-opt" data-emoji="🎯" onclick="selectEmoji(this)">🎯</div>
        <div class="emoji-opt" data-emoji="👑" onclick="selectEmoji(this)">👑</div>
        <div class="emoji-opt" data-emoji="⚡" onclick="selectEmoji(this)">⚡</div>
        <div class="emoji-opt" data-emoji="🐺" onclick="selectEmoji(this)">🐺</div>
        <div class="emoji-opt" data-emoji="💀" onclick="selectEmoji(this)">💀</div>
        <div class="emoji-opt" data-emoji="🦁" onclick="selectEmoji(this)">🦁</div>
        <div class="emoji-opt" data-emoji="🗡️" onclick="selectEmoji(this)">🗡️</div>
        <div class="emoji-opt" data-emoji="🧠" onclick="selectEmoji(this)">🧠</div>
        <div class="emoji-opt" data-emoji="💔" onclick="selectEmoji(this)">💔</div>
      </div>
    </div>

    <button class="submit-btn" id="create-submit-btn" onclick="submitCreateGroup()">CREATE GROUP</button>
  </div>
</div>


<!-- ══ GVG CHALLENGE MODAL ══════════════════════════════════ -->
<div class="gvg-modal-overlay" id="gvg-modal" onclick="if(event.target===this)closeGvGModal()">
  <div class="gvg-modal-sheet">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-family:var(--mod-font-ui);font-size:20px;font-weight:700;color:var(--mod-text-heading);letter-spacing:2px;">
        ⚔️ GVG CHALLENGE
      </div>
      <button onclick="closeGvGModal()" style="background:none;border:none;color:var(--mod-text-primary);font-size:20px;cursor:pointer;">✕</button>
    </div>

    <label style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--mod-text-muted);text-transform:uppercase;margin-bottom:4px;display:block;">OPPONENT GROUP</label>
    <input id="gvg-opponent-search" type="text" placeholder="Search groups…" maxlength="100" class="form-input" style="margin-bottom:4px;">
    <div id="gvg-opponent-results" style="max-height:140px;overflow-y:auto;margin-bottom:8px;"></div>
    <div id="gvg-selected-opponent" style="display:none;background:var(--mod-accent-muted);border:1px solid var(--mod-accent-border);border-radius:8px;padding:10px;margin-bottom:12px;"></div>

    <label style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--mod-text-muted);text-transform:uppercase;margin-bottom:4px;display:block;">DEBATE TOPIC</label>
    <input id="gvg-topic" type="text" placeholder="e.g. Should college athletes be paid?" maxlength="200" class="form-input" style="margin-bottom:12px;">

    <label style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--mod-text-muted);text-transform:uppercase;margin-bottom:4px;display:block;">CATEGORY</label>
    <select id="gvg-category" class="form-select" style="margin-bottom:12px;">
      <option value="politics">Politics</option>
      <option value="sports">Sports</option>
      <option value="entertainment">Entertainment</option>
      <option value="music">Music</option>
      <option value="couples_court">Couples Court</option>
      <option value="general" selected>General</option>
    </select>

    <label style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--mod-text-muted);text-transform:uppercase;margin-bottom:4px;display:block;">FORMAT</label>
    <div class="gvg-format-pills">
      <button class="gvg-format-pill active" data-format="1v1">1v1</button>
      <button class="gvg-format-pill" data-format="3v3">3v3</button>
      <button class="gvg-format-pill" data-format="5v5">5v5</button>
    </div>

    <button class="submit-btn" id="gvg-submit-btn" onclick="submitGroupChallenge()">SEND CHALLENGE ⚔️</button>
    <div id="gvg-error" style="color:var(--mod-accent);font-size:13px;text-align:center;margin-top:8px;display:none;"></div>
  </div>
</div>
