<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1128">
<title>The Colosseum — Groups</title>

<script src="colosseum-locks-fix.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.98.0" integrity="sha384-Sm2s7OXxsAMTyJ4iIyRBgVpeGUvMPk2lRQnnZhE78Wej7oggIoolKt+SCt0XJbUB" crossorigin="anonymous"></script>
<script src="colosseum-config.js"></script>
<script src="colosseum-auth.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Barlow+Condensed:wght@400;600;700&display=swap');

:root {
  --navy: #0a1128;
  --navy-light: #132240;
  --navy-card: rgba(10,17,40,0.6);
  --red: #c1272d;
  --gold: #d4a843;
  --gold-dim: #b8922e;
  --white: #f0ece2;
  --white-dim: #a0a8b8;
  --success: #2ecc71;
  --font-display: 'Cinzel', serif;
  --font-body: 'Barlow Condensed', sans-serif;
  --glass-border: rgba(255,255,255,0.12);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: linear-gradient(145deg, #1a2d4a 0%, #2d5a8e 25%, #5b8abf 50%, #7aa3d4 75%, #3d5a80 100%);
  color: var(--white);
  min-height: 100dvh;
  display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

/* ── TOP BAR ── */
.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,17,40,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--glass-border);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  display: flex; align-items: center; gap: 12px;
}

.back-btn {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--glass-border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--white); font-size: 18px;
  flex-shrink: 0;
}
.back-btn:active { background: rgba(255,255,255,0.15); }

.top-bar-title {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 700;
  color: var(--gold);
  letter-spacing: 2px;
  flex: 1;
}

.create-btn {
  background: var(--gold);
  color: var(--navy);
  border: none; border-radius: 20px;
  padding: 8px 16px;
  font-family: var(--font-body);
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  flex-shrink: 0;
}
.create-btn:active { background: var(--gold-dim); }

/* ── TABS ── */
.tabs {
  display: flex; border-bottom: 1px solid var(--glass-border);
  background: rgba(10,17,40,0.5);
  position: sticky; top: 64px; z-index: 90;
}
.tab-btn {
  flex: 1; padding: 12px 8px;
  background: none; border: none;
  color: var(--white-dim);
  font-family: var(--font-body);
  font-size: 13px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── CATEGORY FILTER ── */
.category-filter {
  display: flex; gap: 8px; padding: 12px 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.category-filter::-webkit-scrollbar { display: none; }
.cat-pill {
  flex-shrink: 0;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--glass-border);
  border-radius: 16px; padding: 6px 14px;
  font-family: var(--font-body); font-size: 12px;
  font-weight: 600; letter-spacing: 0.5px;
  color: var(--white-dim); cursor: pointer;
  transition: all 0.2s;
}
.cat-pill.active {
  background: rgba(212,168,67,0.2);
  border-color: var(--gold);
  color: var(--gold);
}

/* ── CONTENT AREA ── */
.content {
  flex: 1; overflow-y: auto;
  padding: 12px 16px calc(80px + var(--safe-bottom));
}

/* ── GROUP CARD ── */
.group-card {
  background: var(--navy-card);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: border-color 0.2s;
}
.group-card:active { border-color: rgba(212,168,67,0.4); }

.group-emoji {
  font-size: 32px; flex-shrink: 0;
  width: 52px; height: 52px;
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}
.group-info { flex: 1; min-width: 0; }
.group-name {
  font-size: 16px; font-weight: 700;
  color: var(--white); letter-spacing: 0.3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.group-desc {
  font-size: 13px; color: var(--white-dim);
  margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.group-meta {
  display: flex; align-items: center; gap: 10px;
  margin-top: 6px;
}
.meta-pill {
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 8px;
  letter-spacing: 0.3px;
}
.meta-pill.cat {
  background: rgba(193,39,45,0.2); color: #e0606a;
  border: 1px solid rgba(193,39,45,0.3);
}
.meta-pill.members {
  background: rgba(255,255,255,0.06); color: var(--white-dim);
}
.group-elo {
  flex-shrink: 0; text-align: right;
}
.elo-num {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 700;
  color: var(--gold);
}
.elo-label { font-size: 10px; color: var(--white-dim); letter-spacing: 0.5px; }

/* My Groups badge */
.my-role-badge {
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 8px;
  letter-spacing: 0.5px;
}
.my-role-badge.owner { background: rgba(212,168,67,0.2); color: var(--gold); }
.my-role-badge.member { background: rgba(46,204,113,0.15); color: var(--success); }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 60px 20px;
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 20px; font-weight: 700; color: var(--white-dim); margin-bottom: 6px; }
.empty-sub { font-size: 14px; color: var(--white-dim); opacity: 0.6; }

/* ── GROUP DETAIL ── */
#view-detail { display: none; }

.detail-header {
  background: var(--navy-card);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--glass-border);
  padding: 20px 16px 16px;
  text-align: center;
}
.detail-emoji { font-size: 52px; margin-bottom: 8px; }
.detail-name {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 700;
  color: var(--gold); letter-spacing: 2px;
}
.detail-desc { font-size: 14px; color: var(--white-dim); margin-top: 4px; }
.detail-stats {
  display: flex; justify-content: center; gap: 24px;
  margin-top: 12px;
}
.detail-stat { text-align: center; }
.detail-stat-num {
  font-family: var(--font-display); font-size: 22px;
  font-weight: 700; color: var(--white);
}
.detail-stat-num.gold { color: var(--gold); }
.detail-stat-label { font-size: 11px; color: var(--white-dim); letter-spacing: 0.5px; }

.join-btn {
  display: block; width: calc(100% - 32px);
  margin: 14px 16px 0;
  padding: 14px; border-radius: 10px;
  font-family: var(--font-body); font-size: 16px; font-weight: 700;
  letter-spacing: 1px; cursor: pointer; border: none;
  transition: opacity 0.2s;
}
.join-btn.join { background: var(--gold); color: var(--navy); }
.join-btn.leave {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--glass-border);
  color: var(--white-dim);
}
.join-btn:active { opacity: 0.75; }

.detail-tabs { top: 64px; } /* sticky offset for detail view */

/* ── MEMBER ROW ── */
.member-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.member-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  overflow: hidden;
}
.member-avatar img { width: 100%; height: 100%; object-fit: cover; }
.member-info { flex: 1; min-width: 0; }
.member-name { font-size: 14px; font-weight: 700; }
.member-elo { font-size: 12px; color: var(--white-dim); }
.member-role { flex-shrink: 0; }

/* ── HOT TAKE IN GROUP ── */
.group-take {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px;
}
.take-author { font-size: 12px; color: var(--gold); font-weight: 600; margin-bottom: 4px; }
.take-content { font-size: 15px; line-height: 1.4; }

/* ── CREATE MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal-sheet {
  width: 100%; background: #0f1d38;
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--glass-border);
  padding: 0 20px calc(24px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }

.modal-handle {
  width: 36px; height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px; margin: 12px auto 20px;
}
.modal-title {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 700;
  color: var(--gold); letter-spacing: 2px;
  margin-bottom: 20px;
}

.form-field { margin-bottom: 14px; }
.form-label {
  font-size: 12px; font-weight: 700;
  letter-spacing: 1px; color: var(--white-dim);
  text-transform: uppercase; margin-bottom: 6px; display: block;
}
.form-input, .form-select, .form-textarea {
  width: 100%; background: rgba(255,255,255,0.06);
  border: 1px solid var(--glass-border);
  border-radius: 8px; padding: 12px 14px;
  color: var(--white);
  font-family: var(--font-body); font-size: 15px;
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: rgba(212,168,67,0.5);
}
.form-select { appearance: none; -webkit-appearance: none; }
.form-textarea { resize: none; height: 80px; }

.emoji-picker {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.emoji-opt {
  width: 42px; height: 42px; border-radius: 8px; font-size: 22px;
  background: rgba(255,255,255,0.06);
  border: 2px solid transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: border-color 0.15s;
}
.emoji-opt.selected { border-color: var(--gold); background: rgba(212,168,67,0.15); }

.submit-btn {
  width: 100%; padding: 16px;
  background: var(--gold); color: var(--navy);
  border: none; border-radius: 10px;
  font-family: var(--font-body); font-size: 16px; font-weight: 700;
  letter-spacing: 1px; cursor: pointer; margin-top: 8px;
}
.submit-btn:active { background: var(--gold-dim); }
.submit-btn:disabled { opacity: 0.5; pointer-events: none; }

/* ── LOADING ── */
.loading-state { text-align: center; padding: 40px; color: var(--white-dim); }

/* ── LEGAL FOOTER ── */
.colosseum-legal-footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(10,17,40,0.85); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-top: 1px solid rgba(212,168,67,0.15);
  padding: 10px 20px;
  display: flex; justify-content: center; align-items: center; gap: 24px;
  z-index: 999; font-family: var(--font-body); font-size: 0.85rem;
}
.colosseum-legal-footer a { color: #a0b8d0; text-decoration: none; }
.colosseum-legal-footer a:hover { color: var(--gold); }
.footer-sep { color: rgba(212,168,67,0.3); }
.footer-copy { color: #5a7a96; }
</style>
</head>
<body>

<!-- ══ LOBBY VIEW ══════════════════════════════════════════ -->
<div id="view-lobby">

  <div class="top-bar">
    <div class="back-btn" onclick="window.location.href='index.html'">←</div>
    <div class="top-bar-title">GROUPS</div>
    <button class="create-btn" onclick="openCreateModal()">+ CREATE</button>
  </div>

  <div class="tabs" id="lobby-tabs">
    <button class="tab-btn active" onclick="switchTab('discover')">Discover</button>
    <button class="tab-btn" onclick="switchTab('mine')">My Groups</button>
    <button class="tab-btn" onclick="switchTab('leaderboard')">Rankings</button>
  </div>

  <!-- Discover tab -->
  <div id="tab-discover">
    <div class="category-filter" id="cat-filter">
      <div class="cat-pill active" onclick="filterCategory(null, this)">All</div>
      <div class="cat-pill" onclick="filterCategory('politics', this)">🏛️ Politics</div>
      <div class="cat-pill" onclick="filterCategory('sports', this)">🏆 Sports</div>
      <div class="cat-pill" onclick="filterCategory('entertainment', this)">🎬 Entertainment</div>
      <div class="cat-pill" onclick="filterCategory('music', this)">🎵 Music</div>
      <div class="cat-pill" onclick="filterCategory('couples_court', this)">💔 Couples Court</div>
    </div>
    <div class="content" id="discover-list">
      <div class="loading-state">Loading groups…</div>
    </div>
  </div>

  <!-- My Groups tab -->
  <div id="tab-mine" style="display:none;">
    <div class="content" id="mine-list">
      <div class="loading-state">Loading…</div>
    </div>
  </div>

  <!-- Leaderboard tab -->
  <div id="tab-leaderboard" style="display:none;">
    <div class="content" id="leaderboard-list">
      <div class="loading-state">Loading…</div>
    </div>
  </div>

</div>


<!-- ══ DETAIL VIEW ═════════════════════════════════════════ -->
<div id="view-detail" style="display:none; flex-direction:column; min-height:100dvh;">

  <div class="top-bar">
    <div class="back-btn" onclick="showLobby()">←</div>
    <div class="top-bar-title" id="detail-top-name">GROUP</div>
    <div style="width:36px;"></div>
  </div>

  <div class="detail-header">
    <div class="detail-emoji" id="detail-emoji">⚔️</div>
    <div class="detail-name" id="detail-name">Loading…</div>
    <div class="detail-desc" id="detail-desc"></div>
    <div class="detail-stats">
      <div class="detail-stat">
        <div class="detail-stat-num" id="detail-members">—</div>
        <div class="detail-stat-label">MEMBERS</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-num gold" id="detail-elo">—</div>
        <div class="detail-stat-label">GROUP ELO</div>
      </div>
    </div>
  </div>

  <button class="join-btn join" id="join-btn" onclick="toggleMembership()">JOIN GROUP</button>

  <div class="tabs detail-tabs" id="detail-tabs">
    <button class="tab-btn active" onclick="switchDetailTab('hot-takes')">Hot Takes</button>
    <button class="tab-btn" onclick="switchDetailTab('members')">Members</button>
  </div>

  <div class="content">
    <div id="detail-hot-takes">
      <div class="loading-state">Loading hot takes…</div>
    </div>
    <div id="detail-members-list" style="display:none;">
      <div class="loading-state">Loading members…</div>
    </div>
  </div>

</div>


<!-- ══ CREATE MODAL ════════════════════════════════════════ -->
<div class="modal-overlay" id="create-modal" onclick="handleModalBackdrop(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">CREATE GROUP</div>

    <div class="form-field">
      <label class="form-label">Name</label>
      <input class="form-input" id="group-name" type="text" placeholder="Keyboard Warriors, Sports Bros…" maxlength="50">
    </div>

    <div class="form-field">
      <label class="form-label">Description (optional)</label>
      <textarea class="form-textarea" id="group-desc-input" placeholder="What does this group debate about?"></textarea>
    </div>

    <div class="form-field">
      <label class="form-label">Category</label>
      <select class="form-select" id="group-category">
        <option value="general">General</option>
        <option value="politics">Politics</option>
        <option value="sports">Sports</option>
        <option value="entertainment">Entertainment</option>
        <option value="music">Music</option>
        <option value="couples_court">Couples Court</option>
      </select>
    </div>

    <div class="form-field">
      <label class="form-label">Group Emoji</label>
      <div class="emoji-picker" id="emoji-picker">
        <div class="emoji-opt selected" data-emoji="⚔️" onclick="selectEmoji(this)">⚔️</div>
        <div class="emoji-opt" data-emoji="🔥" onclick="selectEmoji(this)">🔥</div>
        <div class="emoji-opt" data-emoji="🏆" onclick="selectEmoji(this)">🏆</div>
        <div class="emoji-opt" data-emoji="🎯" onclick="selectEmoji(this)">🎯</div>
        <div class="emoji-opt" data-emoji="👑" onclick="selectEmoji(this)">👑</div>
        <div class="emoji-opt" data-emoji="⚡" onclick="selectEmoji(this)">⚡</div>
        <div class="emoji-opt" data-emoji="🐺" onclick="selectEmoji(this)">🐺</div>
        <div class="emoji-opt" data-emoji="💀" onclick="selectEmoji(this)">💀</div>
        <div class="emoji-opt" data-emoji="🦁" onclick="selectEmoji(this)">🦁</div>
        <div class="emoji-opt" data-emoji="🗡️" onclick="selectEmoji(this)">🗡️</div>
        <div class="emoji-opt" data-emoji="🧠" onclick="selectEmoji(this)">🧠</div>
        <div class="emoji-opt" data-emoji="💔" onclick="selectEmoji(this)">💔</div>
      </div>
    </div>

    <button class="submit-btn" id="create-submit-btn" onclick="submitCreateGroup()">CREATE GROUP</button>
  </div>
</div>


<!-- ══ LEGAL FOOTER ════════════════════════════════════════ -->
<div class="colosseum-legal-footer">
  <a href="colosseum-privacy.html">Privacy Policy</a>
  <span class="footer-sep">|</span>
  <a href="colosseum-terms.html">Terms of Service</a>
  <span class="footer-sep">|</span>
  <span class="footer-copy">&copy; 2026 The Colosseum</span>
</div>


<script>
// ── STATE ─────────────────────────────────────────────────
let sb = null;
let currentUser = null;
let activeTab = 'discover';
let activeDetailTab = 'hot-takes';
let activeCategory = null;
let selectedEmoji = '⚔️';
let currentGroupId = null;
let isMember = false;

const CATEGORY_LABELS = {
  general: 'General', politics: '🏛️ Politics', sports: '🏆 Sports',
  entertainment: '🎬 Entertainment', music: '🎵 Music', couples_court: '💔 Couples Court'
};

// ── INIT ──────────────────────────────────────────────────
ColosseumAuth.ready.then(() => {
  sb = ColosseumAuth.supabase;
  currentUser = ColosseumAuth.currentUser;
  loadDiscover();
});

// ── TAB SWITCHING ─────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('#lobby-tabs .tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['discover','mine','leaderboard'][i] === tab);
  });
  document.getElementById('tab-discover').style.display = tab === 'discover' ? 'block' : 'none';
  document.getElementById('tab-mine').style.display = tab === 'mine' ? 'block' : 'none';
  document.getElementById('tab-leaderboard').style.display = tab === 'leaderboard' ? 'block' : 'none';

  if (tab === 'mine' && currentUser) loadMyGroups();
  if (tab === 'mine' && !currentUser) {
    document.getElementById('mine-list').innerHTML = renderEmpty('🔒', 'Sign in to see your groups', '');
  }
  if (tab === 'leaderboard') loadLeaderboard();
}

function switchDetailTab(tab) {
  activeDetailTab = tab;
  document.querySelectorAll('#detail-tabs .tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['hot-takes','members'][i] === tab);
  });
  document.getElementById('detail-hot-takes').style.display = tab === 'hot-takes' ? 'block' : 'none';
  document.getElementById('detail-members-list').style.display = tab === 'members' ? 'block' : 'none';
}

// ── CATEGORY FILTER ───────────────────────────────────────
function filterCategory(cat, el) {
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  activeCategory = cat;
  loadDiscover();
}

// ── LOAD: DISCOVER ────────────────────────────────────────
async function loadDiscover() {
  document.getElementById('discover-list').innerHTML = '<div class="loading-state">Loading groups…</div>';
  try {
    const { data, error } = await sb.rpc('discover_groups', {
      p_limit: 30,
      p_category: activeCategory
    });
    if (error) throw error;
    const groups = typeof data === 'string' ? JSON.parse(data) : data;
    renderGroupList('discover-list', groups || []);
  } catch (e) {
    document.getElementById('discover-list').innerHTML = renderEmpty('⚠️', 'Could not load groups', 'Try again in a moment');
  }
}

// ── LOAD: MY GROUPS ───────────────────────────────────────
async function loadMyGroups() {
  document.getElementById('mine-list').innerHTML = '<div class="loading-state">Loading…</div>';
  try {
    const { data, error } = await sb.rpc('get_my_groups');
    if (error) throw error;
    const groups = typeof data === 'string' ? JSON.parse(data) : data;
    if (!groups || groups.length === 0) {
      document.getElementById('mine-list').innerHTML = renderEmpty('👥', "You haven't joined any groups yet", 'Discover groups or create your own');
      return;
    }
    renderGroupList('mine-list', groups, true);
  } catch (e) {
    document.getElementById('mine-list').innerHTML = renderEmpty('⚠️', 'Could not load groups', '');
  }
}

// ── LOAD: LEADERBOARD ─────────────────────────────────────
async function loadLeaderboard() {
  document.getElementById('leaderboard-list').innerHTML = '<div class="loading-state">Loading rankings…</div>';
  try {
    const { data, error } = await sb.rpc('get_group_leaderboard', { p_limit: 20 });
    if (error) throw error;
    const groups = typeof data === 'string' ? JSON.parse(data) : data;
    renderGroupList('leaderboard-list', groups || [], false, true);
  } catch (e) {
    document.getElementById('leaderboard-list').innerHTML = renderEmpty('⚠️', 'Could not load rankings', '');
  }
}

// ── RENDER: GROUP LIST ────────────────────────────────────
function renderGroupList(containerId, groups, showRole = false, showRank = false) {
  const el = document.getElementById(containerId);
  if (groups.length === 0) {
    el.innerHTML = renderEmpty('👥', 'No groups here yet', 'Be the first to create one');
    return;
  }
  const esc = ColosseumConfig.escapeHTML;
  el.innerHTML = groups.map((g, i) => {
    const catLabel = CATEGORY_LABELS[g.category] || esc(g.category || 'General');
    const roleHtml = (showRole && g.role) ? `<span class="my-role-badge ${esc(g.role)}">${esc(g.role.toUpperCase())}</span>` : '';
    return `<div class="group-card" data-group-id="${esc(g.id)}">
      <div class="group-emoji">${esc(g.avatar_emoji || '⚔️')}</div>
      <div class="group-info">
        <div class="group-name">${esc(g.name)}</div>
        ${g.description ? `<div class="group-desc">${esc(g.description)}</div>` : ''}
        <div class="group-meta">
          <span class="meta-pill cat">${catLabel}</span>
          <span class="meta-pill members">👥 ${parseInt(g.member_count, 10) || 0}</span>
          ${roleHtml}
        </div>
      </div>
      <div class="group-elo">
        ${showRank ? `<div class="elo-label">#${parseInt(g.rank, 10) || (i + 1)}</div>` : ''}
        <div class="elo-num">${parseInt(g.elo_rating, 10) || 1000}</div>
        <div class="elo-label">ELO</div>
      </div>
    </div>`;
  }).join('');

  // Event delegation for group cards
  el.querySelectorAll('.group-card[data-group-id]').forEach(card => {
    card.addEventListener('click', () => {
      openGroup(card.dataset.groupId);
    });
  });
}

function renderEmpty(icon, title, sub) {
  return `<div class="empty-state">
    <div class="empty-icon">${icon}</div>
    <div class="empty-title">${title}</div>
    ${sub ? `<div class="empty-sub">${sub}</div>` : ''}
  </div>`;
}

// ── OPEN GROUP DETAIL ─────────────────────────────────────
async function openGroup(groupId) {
  currentGroupId = groupId;
  document.getElementById('view-lobby').style.display = 'none';
  document.getElementById('view-detail').style.display = 'flex';

  // Reset
  document.getElementById('detail-name').textContent = 'Loading…';
  document.getElementById('detail-emoji').textContent = '⚔️';
  document.getElementById('detail-desc').textContent = '';
  document.getElementById('detail-members').textContent = '—';
  document.getElementById('detail-elo').textContent = '—';
  document.getElementById('detail-hot-takes').innerHTML = '<div class="loading-state">Loading hot takes…</div>';
  document.getElementById('detail-members-list').innerHTML = '<div class="loading-state">Loading members…</div>';
  switchDetailTab('hot-takes');

  // Load group details
  try {
    const { data, error } = await sb.rpc('get_group_details', { p_group_id: groupId });
    if (error) throw error;
    const g = typeof data === 'string' ? JSON.parse(data) : data;

    document.getElementById('detail-top-name').textContent = g.name.toUpperCase();
    document.getElementById('detail-emoji').textContent = g.avatar_emoji || '⚔️';
    document.getElementById('detail-name').textContent = g.name;
    document.getElementById('detail-desc').textContent = g.description || '';
    document.getElementById('detail-members').textContent = g.member_count;
    document.getElementById('detail-elo').textContent = g.elo_rating;

    isMember = g.is_member;
    updateJoinBtn(g);
  } catch (e) {
    document.getElementById('detail-name').textContent = 'Error loading group';
  }

  // Load hot takes for this group (section = group_id)
  loadGroupHotTakes(groupId);

  // Load members
  loadGroupMembers(groupId);
}

function updateJoinBtn(g) {
  const btn = document.getElementById('join-btn');
  if (!currentUser) {
    btn.textContent = 'SIGN IN TO JOIN';
    btn.className = 'join-btn join';
    return;
  }
  if (g.is_member) {
    btn.textContent = g.my_role === 'owner' ? 'YOU OWN THIS GROUP' : 'LEAVE GROUP';
    btn.className = g.my_role === 'owner' ? 'join-btn leave' : 'join-btn leave';
    if (g.my_role === 'owner') btn.disabled = true;
  } else {
    btn.textContent = 'JOIN GROUP';
    btn.className = 'join-btn join';
    btn.disabled = false;
  }
}

// ── HOT TAKES FOR GROUP ───────────────────────────────────
async function loadGroupHotTakes(groupId) {
  try {
    // Group hot takes use section = group_id (see SQL header comment)
    const { data, error } = await sb
      .from('hot_takes')
      .select('id, content, user_id, reaction_count, created_at, profiles_public(username, display_name)')
      .eq('section', groupId)
      .eq('is_active', true)
      .order('created_at', { ascending: false })
      .limit(30);

    if (error) throw error;

    if (!data || data.length === 0) {
      document.getElementById('detail-hot-takes').innerHTML = renderEmpty('💬', 'No hot takes yet', 'Join and post the first one');
      return;
    }

    document.getElementById('detail-hot-takes').innerHTML = data.map(t => {
      const author = t.profiles_public?.username || t.profiles_public?.display_name || 'Unknown';
      return `<div class="group-take">
        <div class="take-author">${ColosseumConfig.escapeHTML(author)}</div>
        <div class="take-content">${ColosseumConfig.escapeHTML(t.content)}</div>
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('detail-hot-takes').innerHTML = renderEmpty('⚠️', 'Could not load hot takes', '');
  }
}

// ── MEMBERS LIST ──────────────────────────────────────────
async function loadGroupMembers(groupId) {
  const esc = ColosseumConfig.escapeHTML;
  try {
    const { data, error } = await sb.rpc('get_group_members', { p_group_id: groupId, p_limit: 50 });
    if (error) throw error;
    const members = typeof data === 'string' ? JSON.parse(data) : data;

    if (!members || members.length === 0) {
      document.getElementById('detail-members-list').innerHTML = renderEmpty('👥', 'No members yet', '');
      return;
    }

    document.getElementById('detail-members-list').innerHTML = members.map(m => {
      const name = m.display_name || m.username || 'Gladiator';
      const role = m.role || 'member';
      const roleBadge = role !== 'member'
        ? `<span class="my-role-badge ${esc(role)}">${esc(role.toUpperCase())}</span>` : '';
      return `<div class="member-row">
        <div class="member-avatar">
          ${m.avatar_url ? `<img src="${esc(m.avatar_url)}" alt="">` : '⚔️'}
        </div>
        <div class="member-info">
          <div class="member-name">${esc(name)}</div>
          <div class="member-elo">ELO ${parseInt(m.elo_rating, 10) || 1000} · ${parseInt(m.wins, 10) || 0}W ${parseInt(m.losses, 10) || 0}L</div>
        </div>
        <div class="member-role">${roleBadge}</div>
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('detail-members-list').innerHTML = renderEmpty('⚠️', 'Could not load members', '');
  }
}

// ── JOIN / LEAVE ──────────────────────────────────────────
async function toggleMembership() {
  if (!currentUser) {
    window.location.href = 'colosseum-plinko.html?returnTo=' + encodeURIComponent(window.location.pathname + '?group=' + currentGroupId);
    return;
  }
  const btn = document.getElementById('join-btn');
  btn.disabled = true;
  try {
    if (isMember) {
      const { error } = await sb.rpc('leave_group', { p_group_id: currentGroupId });
      if (error) throw error;
      isMember = false;
      btn.textContent = 'JOIN GROUP';
      btn.className = 'join-btn join';
      document.getElementById('detail-members').textContent =
        (parseInt(document.getElementById('detail-members').textContent) - 1).toString();
    } else {
      const { error } = await sb.rpc('join_group', { p_group_id: currentGroupId });
      if (error) throw error;
      isMember = true;
      btn.textContent = 'LEAVE GROUP';
      btn.className = 'join-btn leave';
      document.getElementById('detail-members').textContent =
        (parseInt(document.getElementById('detail-members').textContent) + 1).toString();
    }
  } catch (e) {
    alert(e.message || 'Something went wrong');
  } finally {
    btn.disabled = false;
  }
}

// ── SHOW LOBBY ────────────────────────────────────────────
function showLobby() {
  currentGroupId = null;
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-lobby').style.display = 'block';
}

// ── CREATE MODAL ──────────────────────────────────────────
function openCreateModal() {
  if (!currentUser) {
    window.location.href = 'colosseum-plinko.html';
    return;
  }
  document.getElementById('create-modal').classList.add('open');
}

function closeCreateModal() {
  document.getElementById('create-modal').classList.remove('open');
}

function handleModalBackdrop(e) {
  if (e.target === document.getElementById('create-modal')) closeCreateModal();
}

function selectEmoji(el) {
  document.querySelectorAll('.emoji-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selectedEmoji = el.dataset.emoji;
}

async function submitCreateGroup() {
  const name = document.getElementById('group-name').value.trim();
  if (!name || name.length < 2) { alert('Group name must be at least 2 characters'); return; }

  const btn = document.getElementById('create-submit-btn');
  btn.disabled = true;
  btn.textContent = 'CREATING…';

  try {
    const { data, error } = await sb.rpc('create_group', {
      p_name: name,
      p_description: document.getElementById('group-desc-input').value.trim() || null,
      p_category: document.getElementById('group-category').value,
      p_is_public: true,
      p_avatar_emoji: selectedEmoji
    });
    if (error) throw error;
    const result = typeof data === 'string' ? JSON.parse(data) : data;

    closeCreateModal();
    document.getElementById('group-name').value = '';
    document.getElementById('group-desc-input').value = '';

    // Open the newly created group
    if (result.group_id) openGroup(result.group_id);

  } catch (e) {
    alert(e.message || 'Could not create group');
  } finally {
    btn.disabled = false;
    btn.textContent = 'CREATE GROUP';
  }
}

// ── URL PARAM: open group directly ────────────────────────
const urlGroup = new URLSearchParams(window.location.search).get('group');
if (urlGroup) {
  ColosseumAuth.ready.then(() => openGroup(urlGroup));
}
</script>
